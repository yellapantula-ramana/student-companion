<svg width="800" height="500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="500" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="#2c3e50">Applications: Clock and Grazing Problems</text>
  
  <!-- Clock Problem -->
  <g transform="translate(100, 80)">
    <text x="120" y="-10" text-anchor="middle" font-family="Arial" font-size="15" font-weight="bold" fill="#2c3e50">Clock Problem (Minute Hand)</text>
    
    <!-- Clock Circle -->
    <circle cx="120" cy="120" r="100" fill="#ecf0f1" stroke="#3498db" stroke-width="2"/>
    
    <!-- Center -->
    <circle cx="120" cy="120" r="5" fill="#e74c3c"/>
    
    <!-- Minute hand at 12 -->
    <line x1="120" y1="120" x2="120" y2="30" stroke="#2c3e50" stroke-width="3"/>
    
    <!-- Minute hand at 1 (5 minutes, 30 degrees) -->
    <line x1="120" y1="120" x2="145.98" y2="34.02" stroke="#e74c3c" stroke-width="3"/>
    
    <!-- Sector (30 degrees) -->
    <path d="M 120 120 L 120 30 A 90 90 0 0 1 145.98 34.02 Z" fill="#f9e79f" opacity="0.6"/>
    
    <!-- Angle arc -->
    <path d="M 120 50 A 70 70 0 0 1 135 55" fill="none" stroke="#9b59b6" stroke-width="2"/>
    <text x="135" y="60" font-family="Arial" font-size="11" fill="#9b59b6">30°</text>
    
    <text x="120" y="20" font-family="Arial" font-size="11" fill="#2c3e50">12</text>
    <text x="155" y="35" font-family="Arial" font-size="11" fill="#2c3e50">1</text>
    
    <text x="120" y="240" text-anchor="middle" font-family="Arial" font-size="11" fill="#2c3e50">5 min = 30° sweep</text>
    <text x="120" y="255" text-anchor="middle" font-family="Arial" font-size="11" fill="#e74c3c">r = 14 cm</text>
  </g>
  
  <!-- Grazing Problem -->
  <g transform="translate(420, 80)">
    <text x="120" y="-10" text-anchor="middle" font-family="Arial" font-size="15" font-weight="bold" fill="#2c3e50">Grazing Area (Horse tied at corner)</text>
    
    <!-- Square Field -->
    <rect x="40" y="60" width="160" height="160" fill="#e8f8f5" stroke="#27ae60" stroke-width="2"/>
    
    <!-- Quarter Circle (grazing area) -->
    <path d="M 40 220 L 40 60 A 160 160 0 0 1 200 220 Z" fill="#f5b041" opacity="0.5"/>
    
    <!-- Rope -->
    <line x1="40" y1="220" x2="120" y2="140" stroke="#e74c3c" stroke-width="2" stroke-dasharray="5,5"/>
    
    <!-- Peg -->
    <circle cx="40" cy="220" r="5" fill="#e74c3c"/>
    
    <!-- Labels -->
    <text x="30" y="230" font-family="Arial" font-size="11" fill="#e74c3c">Peg</text>
    <text x="100" y="180" font-family="Arial" font-size="11" fill="#e74c3c">r = 10 m</text>
    <text x="120" y="140" text-anchor="middle" font-family="Arial" font-size="11" fill="#27ae60">Field 15m × 15m</text>
    
    <text x="120" y="240" text-anchor="middle" font-family="Arial" font-size="11" fill="#2c3e50">Grazing Area = Quadrant</text>
    <text x="120" y="255" text-anchor="middle" font-family="Arial" font-size="11" fill="#2c3e50">= (1/4)πr²</text>
  </g>
  
  <!-- Road Around Park -->
  <g transform="translate(100, 320)">
    <text x="120" y="-10" text-anchor="middle" font-family="Arial" font-size="15" font-weight="bold" fill="#2c3e50">Road Around Circular Park</text>
    
    <!-- Outer Circle -->
    <circle cx="120" cy="120" r="100" fill="#d6eaf8" stroke="#2980b9" stroke-width="2"/>
    
    <!-- Inner Circle (Park) -->
    <circle cx="120" cy="120" r="70" fill="#a9dfbf" stroke="#27ae60" stroke-width="2"/>
    
    <!-- Road (Ring) -->
    <path d="M 120 20 m -100 0 a 100 100 0 1 0 200 0 a 100 100 0 1 0 -200 0 M 120 50 m -70 0 a 70 70 0 1 0 140 0 a 70 70 0 1 0 -140 0" fill="#f5b041" opacity="0.4"/>
    
    <!-- Center -->
    <circle cx="120" cy="120" r="3" fill="#2c3e50"/>
    
    <!-- Radii -->
    <line x1="120" y1="120" x2="220" y2="120" stroke="#e74c3c" stroke-width="2"/>
    <line x1="120" y1="120" x2="190" y2="120" stroke="#27ae60" stroke-width="2"/>
    
    <text x="160" y="135" font-family="Arial" font-size="10" fill="#e74c3c">R = 105+21</text>
    <text x="195" y="135" font-family="Arial" font-size="10" fill="#27ae60">r = 105</text>
    
    <text x="120" y="240" text-anchor="middle" font-family="Arial" font-size="11" fill="#2c3e50">Road Area = π(R² - r²)</text>
  </g>
  
  <!-- Wiper Problem -->
  <g transform="translate(420, 320)">
    <text x="120" y="-10" text-anchor="middle" font-family="Arial" font-size="15" font-weight="bold" fill="#2c3e50">Car Wiper Problem</text>
    
    <!-- Windshield (rectangle) -->
    <rect x="40" y="60" width="160" height="120" fill="#eaf2f8" stroke="#3498db" stroke-width="2"/>
    
    <!-- Wiper 1 sector -->
    <path d="M 60 180 L 60 80 A 100 100 0 0 1 140 140 Z" fill="#f9e79f" opacity="0.6"/>
    
    <!-- Wiper 2 sector -->
    <path d="M 180 180 L 180 80 A 100 100 0 0 0 100 140 Z" fill="#a9dfbf" opacity="0.6"/>
    
    <!-- Wiper blades -->
    <line x1="60" y1="180" x2="60" y2="80" stroke="#2c3e50" stroke-width="3"/>
    <line x1="180" y1="180" x2="180" y2="80" stroke="#2c3e50" stroke-width="3"/>
    
    <!-- Pivot points -->
    <circle cx="60" cy="180" r="4" fill="#e74c3c"/>
    <circle cx="180" cy="180" r="4" fill="#e74c3c"/>
    
    <text x="50" y="195" font-family="Arial" font-size="10" fill="#e74c3c">r = 25 cm</text>
    <text x="170" y="195" font-family="Arial" font-size="10" fill="#e74c3c">θ = 115°</text>
    
    <text x="120" y="210" text-anchor="middle" font-family="Arial" font-size="11" fill="#2c3e50">Total Area = 2 × Sector</text>
  </g>
</svg>
