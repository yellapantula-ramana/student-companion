<svg width="800" height="550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="550" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="#2c3e50">Construction of Similar Triangles</text>
  
  <!-- Original Triangle -->
  <g transform="translate(50, 70)">
    <text x="120" y="-10" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#2c3e50">Original Triangle ABC</text>
    
    <!-- Triangle -->
    <polygon points="120,20 40,140 200,140" fill="#ecf0f1" stroke="#3498db" stroke-width="2"/>
    
    <text x="120" y="15" font-family="Arial" font-size="12" font-weight="bold" fill="#3498db">A</text>
    <text x="25" y="155" font-family="Arial" font-size="12" font-weight="bold" fill="#3498db">B</text>
    <text x="210" y="155" font-family="Arial" font-size="12" font-weight="bold" fill="#3498db">C</text>
    
    <text x="120" y="90" text-anchor="middle" font-family="Arial" font-size="11" fill="#2c3e50">AB = 6 cm</text>
    <text x="120" y="170" text-anchor="middle" font-family="Arial" font-size="11" fill="#2c3e50">BC = 7 cm</text>
    <text x="230" y="90" font-family="Arial" font-size="11" fill="#2c3e50">AC = 8 cm</text>
  </g>
  
  <!-- Scale Factor < 1 -->
  <g transform="translate(400, 70)">
    <text x="150" y="-10" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#2c3e50">Scale Factor &lt; 1 (Smaller)</text>
    
    <!-- Original triangle outline -->
    <polygon points="80,30 20,140 140,140" fill="none" stroke="#95a5a6" stroke-width="1" stroke-dasharray="5,5"/>
    <text x="15" y="135" font-family="Arial" font-size="10" fill="#95a5a6">B</text>
    <text x="145" y="135" font-family="Arial" font-size="10" fill="#95a5a6">C</text>
    
    <!-- New triangle -->
    <polygon points="80,30 50,85 110,85" fill="#e8f6f3" stroke="#1abc9c" stroke-width="2"/>
    <text x="80" y="25" font-family="Arial" font-size="11" font-weight="bold" fill="#1abc9c">A'</text>
    <text x="40" y="100" font-family="Arial" font-size="11" font-weight="bold" fill="#1abc9c">B'</text>
    <text x="115" y="100" font-family="Arial" font-size="11" font-weight="bold" fill="#1abc9c">C'</text>
    
    <!-- Ray -->
    <line x1="20" y1="140" x2="10" y2="160" stroke="#2ecc71" stroke-width="2"/>
    
    <!-- Points on ray -->
    <circle cx="18" cy="145" r="2" fill="#e74c3c"/>
    <circle cx="16" cy="150" r="2" fill="#e74c3c"/>
    <circle cx="14" cy="155" r="2" fill="#e74c3c"/>
    <circle cx="12" cy="160" r="2" fill="#e74c3c"/>
    
    <text x="5" y="150" font-family="Arial" font-size="9" fill="#e74c3c">B₁</text>
    <text x="5" y="157" font-family="Arial" font-size="9" fill="#e74c3c">B₂</text>
    <text x="5" y="164" font-family="Arial" font-size="9" fill="#e74c3c">B₃</text>
    <text x="5" y="171" font-family="Arial" font-size="9" fill="#e74c3c">B₄</text>
    
    <!-- Scale factor label -->
    <text x="80" y="190" text-anchor="middle" font-family="Arial" font-size="12" fill="#16a085" font-weight="bold">Scale: 3/4</text>
  </g>
  
  <!-- Scale Factor > 1 -->
  <g transform="translate(50, 280)">
    <text x="150" y="-10" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#2c3e50">Scale Factor &gt; 1 (Larger)</text>
    
    <!-- Original triangle -->
    <polygon points="100,40 40,120 160,120" fill="none" stroke="#95a5a6" stroke-width="1" stroke-dasharray="5,5"/>
    <text x="100" y="35" font-family="Arial" font-size="10" fill="#95a5a6">A</text>
    <text x="25" y="135" font-family="Arial" font-size="10" fill="#95a5a6">B</text>
    <text x="170" y="135" font-family="Arial" font-size="10" fill="#95a5a6">C</text>
    
    <!-- Extended sides -->
    <line x1="100" y1="40" x2="115" y2="10" stroke="#9b59b6" stroke-width="1" stroke-dasharray="3,3"/>
    <line x1="160" y1="120" x2="200" y2="120" stroke="#9b59b6" stroke-width="1" stroke-dasharray="3,3"/>
    
    <!-- New larger triangle -->
    <polygon points="115,10 25,120 200,120" fill="#fef9e7" stroke="#f39c12" stroke-width="2"/>
    <text x="115" y="5" font-family="Arial" font-size="11" font-weight="bold" fill="#f39c12">A'</text>
    <text x="10" y="135" font-family="Arial" font-size="11" font-weight="bold" fill="#f39c12">B'</text>
    <text x="210" y="135" font-family="Arial" font-size="11" font-weight="bold" fill="#f39c12">C'</text>
    
    <!-- Ray with points -->
    <line x1="40" y1="120" x2="20" y2="150" stroke="#2ecc71" stroke-width="2"/>
    
    <circle cx="36" cy="126" r="2" fill="#e74c3c"/>
    <circle cx="32" cy="132" r="2" fill="#e74c3c"/>
    <circle cx="28" cy="138" r="2" fill="#e74c3c"/>
    <circle cx="24" cy="144" r="2" fill="#e74c3c"/>
    <circle cx="20" cy="150" r="2" fill="#e74c3c"/>
    
    <text x="15" y="130" font-family="Arial" font-size="8" fill="#e74c3c">B₁</text>
    <text x="12" y="138" font-family="Arial" font-size="8" fill="#e74c3c">B₂</text>
    <text x="10" y="146" font-family="Arial" font-size="8" fill="#e74c3c">B₃</text>
    <text x="8" y="154" font-family="Arial" font-size="8" fill="#e74c3c">B₄</text>
    <text x="5" y="162" font-family="Arial" font-size="8" fill="#e74c3c">B₅</text>
    
    <!-- Scale factor label -->
    <text x="100" y="180" text-anchor="middle" font-family="Arial" font-size="12" fill="#d68910" font-weight="bold">Scale: 5/3</text>
  </g>
  
  <!-- Steps Box -->
  <g transform="translate(450, 280)">
    <rect x="0" y="0" width="330" height="250" fill="#f8f9fa" stroke="#bdc3c7" stroke-width="1" rx="5"/>
    <text x="165" y="25" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#2c3e50">Construction Steps</text>
    
    <text x="15" y="50" font-family="Arial" font-size="11" fill="#2c3e50">1. Draw the given triangle ABC</text>
    <text x="15" y="75" font-family="Arial" font-size="11" fill="#2c3e50">2. Draw ray BX at acute angle to BC</text>
    <text x="15" y="100" font-family="Arial" font-size="11" fill="#2c3e50">3. Mark max(m,n) points on BX</text>
    <text x="15" y="125" font-family="Arial" font-size="11" fill="#2c3e50">4. Join Bₙ to C (smaller number)</text>
    <text x="15" y="150" font-family="Arial" font-size="11" fill="#2c3e50">5. Draw parallel through Bₘ</text>
    <text x="15" y="175" font-family="Arial" font-size="11" fill="#2c3e50">6. Draw parallel to CA for A'</text>
    
    <text x="165" y="205" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#7f8c8d">────────────────────</text>
    
    <text x="15" y="230" font-family="Arial" font-size="11" fill="#2c3e50">For scale &gt;1: Extend sides</text>
    <text x="15" y="250" font-family="Arial" font-size="11" fill="#2c3e50">For scale &lt;1: Triangle is inside</text>
  </g>
</svg>
