<svg width="850" height="550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="850" height="550" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="425" y="30" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="#2c3e50">Electromagnetic Induction & Electric Generator</text>
  
  <!-- Electromagnetic Induction Setup -->
  <g transform="translate(50, 80)">
    <text x="150" y="-10" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#2c3e50">Electromagnetic Induction</text>
    
    <!-- Solenoid/Coil -->
    <ellipse cx="50" cy="80" rx="25" ry="35" fill="none" stroke="#7f8c8d" stroke-width="3"/>
    <ellipse cx="100" cy="80" rx="25" ry="35" fill="none" stroke="#7f8c8d" stroke-width="3"/>
    <ellipse cx="150" cy="80" rx="25" ry="35" fill="none" stroke="#7f8c8d" stroke-width="3"/>
    <ellipse cx="200" cy="80" rx="25" ry="35" fill="none" stroke="#7f8c8d" stroke-width="3"/>
    
    <!-- Galvanometer -->
    <circle cx="150" cy="160" r="30" fill="#ecf0f1" stroke="#3498db" stroke-width="2"/>
    <line x1="150" y1="160" x2="150" y2="145" stroke="#e74c3c" stroke-width="2"/>
    <text x="150" y="140" text-anchor="middle" font-family="Arial" font-size="10" fill="#e74c3c">G</text>
    <text x="150" y="200" text-anchor="middle" font-family="Arial" font-size="11" fill="#2c3e50">Galvanometer</text>
    
    <!-- Connections -->
    <line x1="25" y1="80" x2="25" y2="160" x3="120" y3="160" stroke="#34495e" stroke-width="2"/>
    <line x1="225" y1="80" x2="225" y2="160" x3="180" y3="160" stroke="#34495e" stroke-width="2"/>
    
    <!-- Bar magnet -->
    <rect x="280" y="60" width="80" height="40" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
    <rect x="320" y="60" width="40" height="40" fill="#3498db" stroke="#2980b9" stroke-width="2"/>
    <text x="300" y="85" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="white">N</text>
    <text x="340" y="85" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="white">S</text>
    
    <!-- Motion arrow -->
    <line x1="270" y1="80" x2="300" y2="80" stroke="#27ae60" stroke-width="3"/>
    <polygon points="275,80 285,75 285,85" fill="#27ae60"/>
    <text x="285" y="75" font-family="Arial" font-size="10" fill="#27ae60">Move</text>
    
    <text x="150" y="230" text-anchor="middle" font-family="Arial" font-size="11" fill="#2c3e50">Relative motion induces current</text>
  </g>
  
  <!-- Fleming's Right-Hand Rule -->
  <g transform="translate(450, 80)">
    <text x="150" y="-10" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#2c3e50">Fleming's Right-Hand Rule</text>
    
    <!-- Hand outline -->
    <path d="M 120 120 L 120 60 L 100 60 L 100 100 L 80 100 L 80 80 L 60 80 L 60 120" fill="#f5cba7" stroke="#d68910" stroke-width="2"/>
    
    <!-- Thumb (Motion) -->
    <line x1="100" y1="60" x2="100" y2="20" stroke="#e74c3c" stroke-width="6"/>
    <polygon points="100,10 95,25 105,25" fill="#e74c3c"/>
    <text x="110" y="30" font-family="Arial" font-size="11" font-weight="bold" fill="#e74c3c">Thumb = Motion</text>
    
    <!-- Forefinger (Field) -->
    <line x1="80" y1="80" x2="30" y2="80" stroke="#3498db" stroke-width="6"/>
    <polygon points="20,80 35,75 35,85" fill="#3498db"/>
    <text x="30" y="70" font-family="Arial" font-size="11" font-weight="bold" fill="#3498db">Forefinger = Field</text>
    
    <!-- Center finger (Induced Current) -->
    <line x1="120" y1="100" x2="160" y2="100" stroke="#27ae60" stroke-width="6"/>
    <polygon points="170,100 155,95 155,105" fill="#27ae60"/>
    <text x="150" y="95" font-family="Arial" font-size="11" font-weight="bold" fill="#27ae60">Center = Induced I</text>
    
    <text x="150" y="150" text-anchor="middle" font-family="Arial" font-size="10" fill="#2c3e50">For induced current direction</text>
  </g>
  
  <!-- AC Generator -->
  <g transform="translate(50, 300)">
    <text x="150" y="-10" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#2c3e50">AC Generator (Dynamo)</text>
    
    <!-- Horseshoe magnet -->
    <path d="M 50 50 L 50 150 C 50 170, 70 170, 70 150 L 70 50" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
    <path d="M 230 50 L 230 150 C 230 170, 210 170, 210 150 L 210 50" fill="#3498db" stroke="#2980b9" stroke-width="2"/>
    
    <text x="60" y="100" font-family="Arial" font-size="14" font-weight="bold" fill="white">N</text>
    <text x="220" y="100" font-family="Arial" font-size="14" font-weight="bold" fill="white">S</text>
    
    <!-- Field lines -->
    <line x1="80" y1="80" x2="200" y2="80" stroke="#f39c12" stroke-width="1" stroke-dasharray="3,3"/>
    <line x1="80" y1="100" x2="200" y2="100" stroke="#f39c12" stroke-width="1" stroke-dasharray="3,3"/>
    <line x1="80" y1="120" x2="200" y2="120" stroke="#f39c12" stroke-width="1" stroke-dasharray="3,3"/>
    
    <!-- Rotating coil -->
    <rect x="100" y="70" width="80" height="60" fill="none" stroke="#7f8c8d" stroke-width="4" transform="rotate(30 140 100)"/>
    
    <!-- Slip rings -->
    <circle cx="60" cy="100" r="8" fill="none" stroke="#f39c12" stroke-width="3"/>
    <circle cx="240" cy="100" r="8" fill="none" stroke="#f39c12" stroke-width="3"/>
    
    <!-- Brushes -->
    <rect x="45" y="85" width="10" height="30" fill="#34495e"/>
    <rect x="245" y="85" width="10" height="30" fill="#34495e"/>
    
    <!-- Galvanometer -->
    <circle cx="140" cy="200" r="25" fill="#ecf0f1" stroke="#3498db" stroke-width="2"/>
    <text x="140" y="205" text-anchor="middle" font-family="Arial" font-size="10" fill="#e74c3c">G</text>
    
    <!-- Connections -->
    <line x1="50" y1="115" x2="50" y2="200" x3="115" y3="200" stroke="#34495e" stroke-width="2"/>
    <line x1="250" y1="115" x2="250" y2="200" x3="165" y3="200" stroke="#34495e" stroke-width="2"/>
    
    <!-- Rotation arrow -->
    <path d="M 140 55 A 25 25 0 0 1 155 70" fill="none" stroke="#e74c3c" stroke-width="2"/>
    <polygon points="158,73 150,67 160,63" fill="#e74c3c"/>
    
    <text x="150" y="240" text-anchor="middle" font-family="Arial" font-size="10" fill="#2c3e50">Slip rings = AC output</text>
  </g>
  
  <!-- DC Generator -->
  <g transform="translate(450, 300)">
    <text x="150" y="-10" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#2c3e50">DC Generator</text>
    
    <!-- Horseshoe magnet -->
    <path d="M 50 50 L 50 150 C 50 170, 70 170, 70 150 L 70 50" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
    <path d="M 230 50 L 230 150 C 230 170, 210 170, 210 150 L 210 50" fill="#3498db" stroke="#2980b9" stroke-width="2"/>
    
    <text x="60" y="100" font-family="Arial" font-size="14" font-weight="bold" fill="white">N</text>
    <text x="220" y="100" font-family="Arial" font-size="14" font-weight="bold" fill="white">S</text>
    
    <!-- Rotating coil -->
    <rect x="100" y="70" width="80" height="60" fill="none" stroke="#7f8c8d" stroke-width="4" transform="rotate(30 140 100)"/>
    
    <!-- Split ring commutator -->
    <path d="M 60 95 A 5 5 0 0 1 60 105" fill="none" stroke="#f39c12" stroke-width="3"/>
    <path d="M 235 95 A 5 5 0 0 0 235 105" fill="none" stroke="#f39c12" stroke-width="3"/>
    
    <!-- Brushes -->
    <rect x="45" y="85" width="10" height="30" fill="#34495e"/>
    <rect x="245" y="85" width="10" height="30" fill="#34495e"/>
    
    <!-- Bulb (load) -->
    <circle cx="140" cy="200" r="20" fill="#f9e79f" stroke="#f39c12" stroke-width="2"/>
    <path d="M 130 200 L 150 200 M 140 190 L 140 210" stroke="#f39c12" stroke-width="2"/>
    
    <!-- Connections -->
    <line x1="50" y1="115" x2="50" y2="200" x3="120" y3="200" stroke="#34495e" stroke-width="2"/>
    <line x1="245" y1="115" x2="245" y2="200" x3="160" y3="200" stroke="#34495e" stroke-width="2"/>
    
    <text x="150" y="240" text-anchor="middle" font-family="Arial" font-size="10" fill="#2c3e50">Split ring = DC output</text>
  </g>
  
  <!-- Key Points Box -->
  <g transform="translate(550, 80)">
    <rect x="0" y="0" width="280" height="130" fill="#fef9e7" stroke="#f39c12" stroke-width="1" rx="5"/>
    <text x="140" y="25" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#d68910">Key Points: Induction</text>
    
    <text x="10" y="50" font-family="Arial" font-size="10" fill="#2c3e50">• Changing magnetic field → induced current</text>
    <text x="10" y="70" font-family="Arial" font-size="10" fill="#2c3e50">• Relative motion between coil & magnet</text>
    <text x="10" y="90" font-family="Arial" font-size="10" fill="#2c3e50">• Faster motion = larger induced current</text>
    <text x="10" y="110" font-family="Arial" font-size="10" fill="#2c3e50">• Direction: Fleming's Right-Hand Rule</text>
    <text x="10" y="130" font-family="Arial" font-size="10" fill="#2c3e50">• AC: Slip rings | DC: Split ring</text>
  </g>
</svg>
