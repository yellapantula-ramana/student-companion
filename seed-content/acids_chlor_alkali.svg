<svg width="900" height="550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="900" height="550" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="#2c3e50">Chlor-Alkali Process & Products of Common Salt</text>
  
  <!-- Central NaCl -->
  <g transform="translate(400, 80)">
    <circle cx="50" cy="50" r="45" fill="#f9e79f" stroke="#f39c12" stroke-width="3"/>
    <text x="50" y="45" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#2c3e50">NaCl</text>
    <text x="50" y="65" text-anchor="middle" font-family="Arial" font-size="10" fill="#7f8c8d">Common Salt</text>
  </g>
  
  <!-- Arrow to Chlor-Alkali -->
  <line x1="450" y1="130" x2="450" y2="170" stroke="#2c3e50" stroke-width="3"/>
  <polygon points="450,170 445,160 455,160" fill="#2c3e50"/>
  <text x="450" y="155" text-anchor="middle" font-family="Arial" font-size="10" fill="#2c3e50">Electrolysis</text>
  
  <!-- Chlor-Alkali Process Box -->
  <g transform="translate(250, 175)">
    <rect x="0" y="0" width="400" height="80" fill="#e8f8f5" stroke="#1abc9c" stroke-width="2" rx="5"/>
    <text x="200" y="30" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#16a085">Chlor-Alkali Process</text>
    <text x="200" y="50" text-anchor="middle" font-family="Arial" font-size="11" fill="#2c3e50">2NaCl(aq) + 2H₂O(l) → 2NaOH(aq) + Cl₂(g) + H₂(g)</text>
    <text x="200" y="70" text-anchor="middle" font-family="Arial" font-size="10" fill="#7f8c8d">Electrolysis of brine (aqueous NaCl)</text>
  </g>
  
  <!-- Three Products -->
  <g transform="translate(100, 280)">
    <!-- NaOH -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="200" height="120" fill="#fef9e7" stroke="#f39c12" stroke-width="2" rx="5"/>
      <text x="100" y="30" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#d68910">NaOH</text>
      <text x="100" y="50" text-anchor="middle" font-family="Arial" font-size="11" fill="#2c3e50">Sodium Hydroxide</text>
      <text x="100" y="70" text-anchor="middle" font-family="Arial" font-size="10" fill="#7f8c8d">(Alkali)</text>
      <line x1="10" y1="80" x2="190" y2="80" stroke="#f39c12" stroke-width="1"/>
      <text x="100" y="100" text-anchor="middle" font-family="Arial" font-size="9" fill="#2c3e50">• Soap making</text>
      <text x="100" y="115" text-anchor="middle" font-family="Arial" font-size="9" fill="#2c3e50">• Paper industry</text>
    </g>
    
    <!-- Cl2 -->
    <g transform="translate(230, 0)">
      <rect x="0" y="0" width="200" height="120" fill="#e8f6f3" stroke="#1abc9c" stroke-width="2" rx="5"/>
      <text x="100" y="30" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#16a085">Cl₂</text>
      <text x="100" y="50" text-anchor="middle" font-family="Arial" font-size="11" fill="#2c3e50">Chlorine Gas</text>
      <text x="100" y="70" text-anchor="middle" font-family="Arial" font-size="10" fill="#7f8c8d">(At anode)</text>
      <line x1="10" y1="80" x2="190" y2="80" stroke="#1abc9c" stroke-width="1"/>
      <text x="100" y="100" text-anchor="middle" font-family="Arial" font-size="9" fill="#2c3e50">• Bleaching powder</text>
      <text x="100" y="115" text-anchor="middle" font-family="Arial" font-size="9" fill="#2c3e50">• Water treatment</text>
    </g>
    
    <!-- H2 -->
    <g transform="translate(460, 0)">
      <rect x="0" y="0" width="200" height="120" fill="#ebf5fb" stroke="#3498db" stroke-width="2" rx="5"/>
      <text x="100" y="30" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#2980b9">H₂</text>
      <text x="100" y="50" text-anchor="middle" font-family="Arial" font-size="11" fill="#2c3e50">Hydrogen Gas</text>
      <text x="100" y="70" text-anchor="middle" font-family="Arial" font-size="10" fill="#7f8c8d">(At cathode)</text>
      <line x1="10" y1="80" x2="190" y2="80" stroke="#3498db" stroke-width="1"/>
      <text x="100" y="100" text-anchor="middle" font-family="Arial" font-size="9" fill="#2c3e50">• Fuel</text>
      <text x="100" y="115" text-anchor="middle" font-family="Arial" font-size="9" fill="#2c3e50">• Hydrogenation</text>
    </g>
  </g>
  
  <!-- Products from Chlorine -->
  <g transform="translate(100, 430)">
    <text x="100" y="0" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#16a085">From Cl₂:</text>
    
    <!-- Bleaching Powder -->
    <g transform="translate(0, 20)">
      <rect x="0" y="0" width="180" height="50" fill="#fdebd0" stroke="#e67e22" stroke-width="1" rx="3"/>
      <text x="90" y="20" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#d35400">CaOCl₂</text>
      <text x="90" y="38" text-anchor="middle" font-family="Arial" font-size="9" fill="#2c3e50">Bleaching Powder</text>
    </g>
    
    <!-- HCl -->
    <g transform="translate(200, 20)">
      <rect x="0" y="0" width="180" height="50" fill="#fdebd0" stroke="#e67e22" stroke-width="1" rx="3"/>
      <text x="90" y="20" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#d35400">HCl</text>
      <text x="90" y="38" text-anchor="middle" font-family="Arial" font-size="9" fill="#2c3e50">Hydrochloric Acid</text>
    </g>
    
    <!-- PVC -->
    <g transform="translate(400, 20)">
      <rect x="0" y="0" width="180" height="50" fill="#fdebd0" stroke="#e67e22" stroke-width="1" rx="3"/>
      <text x="90" y="20" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#d35400">PVC Plastics</text>
      <text x="90" y="38" text-anchor="middle" font-family="Arial" font-size="9" fill="#2c3e50">Plastic pipes, cables</text>
    </g>
    
    <!-- Arrows from Cl2 -->
    <line x1="330" y1="410" x2="330" y2="425" stroke="#1abc9c" stroke-width="2" stroke-dasharray="3,3"/>
    <line x1="330" y1="425" x2="90" y2="425" stroke="#1abc9c" stroke-width="2" stroke-dasharray="3,3"/>
    <line x1="330" y1="425" x2="290" y2="425" stroke="#1abc9c" stroke-width="2" stroke-dasharray="3,3"/>
    <line x1="330" y1="425" x2="490" y2="425" stroke="#1abc9c" stroke-width="2" stroke-dasharray="3,3"/>
  </g>
  
  <!-- Other Salt Products (right side) -->
  <g transform="translate(650, 280)">
    <rect x="0" y="0" width="230" height="200" fill="#fdedec" stroke="#e74c3c" stroke-width="2" rx="5"/>
    <text x="115" y="25" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#c0392b">Other Salt Products</text>
    
    <!-- Washing Soda -->
    <text x="15" y="50" font-family="Arial" font-size="10" fill="#2c3e50">• Na₂CO₃ (Washing Soda)</text>
    <text x="25" y="65" font-family="Arial" font-size="9" fill="#7f8c8d">Water softening, cleaning</text>
    
    <!-- Baking Soda -->
    <text x="15" y="90" font-family="Arial" font-size="10" fill="#2c3e50">• NaHCO₃ (Baking Soda)</text>
    <text x="25" y="105" font-family="Arial" font-size="9" fill="#7f8c8d">Baking, antacid, fire extinguisher</text>
    
    <!-- Plaster of Paris -->
    <text x="15" y="130" font-family="Arial" font-size="10" fill="#2c3e50">• CaSO₄·½H₂O (POP)</text>
    <text x="25" y="145" font-family="Arial" font-size="9" fill="#7f8c8d">Castes, toys, decorative items</text>
    
    <!-- Iodized Salt -->
    <text x="15" y="170" font-family="Arial" font-size="10" fill="#2c3e50">• Iodized Salt (NaCl + I₂)</text>
    <text x="25" y="185" font-family="Arial" font-size="9" fill="#7f8c8d">Prevents goitre</text>
  </g>
</svg>
