<svg width="850" height="450" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="850" height="450" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="425" y="30" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="#2c3e50">Neutralization Reaction</text>
  
  <!-- Reaction diagram -->
  <g transform="translate(50, 80)">
    <!-- Acid beaker -->
    <g transform="translate(20, 20)">
      <path d="M 20 10 L 20 100 L 80 100 L 80 10" fill="none" stroke="#333" stroke-width="2"/>
      <rect x="20" y="60" width="60" height="40" fill="#ffcccc" opacity="0.7"/>
      <text x="50" y="125" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#c0392b">Acid (HCl)</text>
      <text x="50" y="140" text-anchor="middle" font-family="Arial" font-size="10" fill="#c0392b">H⁺ + Cl⁻</text>
      <text x="50" y="35" text-anchor="middle" font-family="Arial" font-size="14" fill="#c0392b">pH &lt; 7</text>
    </g>
    
    <!-- Plus sign -->
    <text x="130" y="95" font-family="Arial" font-size="40" font-weight="bold" fill="#2c3e50">+</text>
    
    <!-- Base beaker -->
    <g transform="translate(160, 20)">
      <path d="M 20 10 L 20 100 L 80 100 L 80 10" fill="none" stroke="#333" stroke-width="2"/>
      <rect x="20" y="60" width="60" height="40" fill="#cce5ff" opacity="0.7"/>
      <text x="50" y="125" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#16a085">Base (NaOH)</text>
      <text x="50" y="140" text-anchor="middle" font-family="Arial" font-size="10" fill="#16a085">Na⁺ + OH⁻</text>
      <text x="50" y="35" text-anchor="middle" font-family="Arial" font-size="14" fill="#16a085">pH &gt; 7</text>
    </g>
    
    <!-- Arrow -->
    <line x1="270" y1="80" x2="340" y2="80" stroke="#2c3e50" stroke-width="3"/>
    <polygon points="340,80 330,75 330,85" fill="#2c3e50"/>
    <text x="305" y="70" text-anchor="middle" font-family="Arial" font-size="11" fill="#2c3e50">Mix</text>
    
    <!-- Product beaker -->
    <g transform="translate(370, 20)">
      <path d="M 20 10 L 20 100 L 80 100 L 80 10" fill="none" stroke="#333" stroke-width="2"/>
      <rect x="20" y="60" width="60" height="40" fill="#d5f5e3" opacity="0.7"/>
      <text x="50" y="125" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#27ae60">Salt + Water</text>
      <text x="50" y="140" text-anchor="middle" font-family="Arial" font-size="10" fill="#27ae60">NaCl + H₂O</text>
      <text x="50" y="35" text-anchor="middle" font-family="Arial" font-size="14" fill="#27ae60">pH = 7</text>
    </g>
  </g>
  
  <!-- Chemical equation -->
  <g transform="translate(50, 260)">
    <rect x="0" y="0" width="730" height="80" fill="#fef9e7" stroke="#f39c12" stroke-width="1" rx="5"/>
    
    <!-- Equation -->
    <text x="365" y="35" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#2c3e50">Chemical Equation:</text>
    <text x="365" y="60" text-anchor="middle" font-family="Arial" font-size="14" fill="#c0392b">HCl</text>
    <text x="405" y="60" text-anchor="middle" font-family="Arial" font-size="14" fill="#2c3e50">+</text>
    <text x="445" y="60" text-anchor="middle" font-family="Arial" font-size="14" fill="#16a085">NaOH</text>
    <text x="510" y="60" text-anchor="middle" font-family="Arial" font-size="14" fill="#2c3e50">→</text>
    <text x="560" y="60" text-anchor="middle" font-family="Arial" font-size="14" fill="#27ae60">NaCl</text>
    <text x="615" y="60" text-anchor="middle" font-family="Arial" font-size="14" fill="#2c3e50">+</text>
    <text x="660" y="60" text-anchor="middle" font-family="Arial" font-size="14" fill="#3498db">H₂O</text>
    
    <text x="365" y="75" text-anchor="middle" font-family="Arial" font-size="11" fill="#7f8c8d">(Acid) + (Base) → (Salt) + (Water)</text>
  </g>
  
  <!-- Ionic equation -->
  <g transform="translate(50, 355)">
    <rect x="0" y="0" width="730" height="70" fill="#e8f8f5" stroke="#1abc9c" stroke-width="1" rx="5"/>
    
    <text x="365" y="25" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#16a085">Ionic Equation:</text>
    <text x="365" y="48" text-anchor="middle" font-family="Arial" font-size="13" fill="#2c3e50">H⁺</text>
    <text x="390" y="48" text-anchor="middle" font-family="Arial" font-size="13" fill="#2c3e50">(aq)</text>
    <text x="430" y="48" text-anchor="middle" font-family="Arial" font-size="13" fill="#2c3e50">+</text>
    <text x="465" y="48" text-anchor="middle" font-family="Arial" font-size="13" fill="#2c3e50">OH⁻</text>
    <text x="495" y="48" text-anchor="middle" font-family="Arial" font-size="13" fill="#2c3e50">(aq)</text>
    <text x="545" y="48" text-anchor="middle" font-family="Arial" font-size="13" fill="#2c3e50">→</text>
    <text x="590" y="48" text-anchor="middle" font-family="Arial" font-size="13" fill="#3498db">H₂O</text>
    <text x="630" y="48" text-anchor="middle" font-family="Arial" font-size="13" fill="#2c3e50">(l)</text>
    
    <text x="365" y="63" text-anchor="middle" font-family="Arial" font-size="10" fill="#27ae60">Hydrogen ions + Hydroxide ions → Water</text>
  </g>
</svg>
