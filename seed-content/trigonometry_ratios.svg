<svg width="600" height="400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="600" height="400" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="300" y="35" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="#2c3e50">Trigonometric Ratios</text>
  
  <!-- Triangle 1: sin θ -->
  <g transform="translate(50, 80)">
    <text x="60" y="-10" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#2c3e50">sin θ = P/H</text>
    <line x1="0" y1="0" x2="0" y2="100" stroke="#3498db" stroke-width="2"/>
    <line x1="0" y1="100" x2="120" y2="100" stroke="#95a5a6" stroke-width="2"/>
    <line x1="0" y1="100" x2="120" y2="100" stroke="#2ecc71" stroke-width="3"/>
    <line x1="0" y1="0" x2="120" y2="100" stroke="#e74c3c" stroke-width="2"/>
    <text x="-15" y="50" font-family="Arial" font-size="12" fill="#3498db">P</text>
    <text x="60" y="115" text-anchor="middle" font-family="Arial" font-size="12" fill="#2ecc71">H</text>
  </g>
  
  <!-- Triangle 2: cos θ -->
  <g transform="translate(250, 80)">
    <text x="60" y="-10" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#2c3e50">cos θ = B/H</text>
    <line x1="0" y1="0" x2="0" y2="100" stroke="#95a5a6" stroke-width="2"/>
    <line x1="0" y1="100" x2="120" y2="100" stroke="#2ecc71" stroke-width="3"/>
    <line x1="0" y1="0" x2="120" y2="100" stroke="#e74c3c" stroke-width="2"/>
    <text x="60" y="115" text-anchor="middle" font-family="Arial" font-size="12" fill="#2ecc71">B</text>
    <text x="70" y="50" font-family="Arial" font-size="12" fill="#e74c3c">H</text>
  </g>
  
  <!-- Triangle 3: tan θ -->
  <g transform="translate(450, 80)">
    <text x="60" y="-10" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#2c3e50">tan θ = P/B</text>
    <line x1="0" y1="0" x2="0" y2="100" stroke="#3498db" stroke-width="3"/>
    <line x1="0" y1="100" x2="120" y2="100" stroke="#95a5a6" stroke-width="2"/>
    <line x1="0" y1="0" x2="120" y2="100" stroke="#e74c3c" stroke-width="2"/>
    <text x="-15" y="50" font-family="Arial" font-size="12" fill="#3498db">P</text>
    <text x="60" y="115" text-anchor="middle" font-family="Arial" font-size="12" fill="#95a5a6">B</text>
  </g>
  
  <!-- Reciprocal Ratios -->
  <g transform="translate(50, 250)">
    <rect x="0" y="0" width="500" height="120" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1" rx="10"/>
    <text x="250" y="25" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#2c3e50">Reciprocal Relationships</text>
    <text x="80" y="55" font-family="Arial" font-size="14" fill="#e74c3c">cosec θ = 1/sin θ = H/P</text>
    <text x="280" y="55" font-family="Arial" font-size="14" fill="#e74c3c">sec θ = 1/cos θ = H/B</text>
    <text x="180" y="85" font-family="Arial" font-size="14" fill="#e74c3c">cot θ = 1/tan θ = B/P</text>
  </g>
</svg>
