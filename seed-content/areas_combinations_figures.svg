<svg width="850" height="550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="850" height="550" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="425" y="30" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="#2c3e50">Areas of Combinations of Figures</text>
  
  <!-- Square with Inscribed Circle -->
  <g transform="translate(80, 80)">
    <text x="120" y="-10" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#2c3e50">Square with Inscribed Circle</text>
    
    <!-- Square -->
    <rect x="40" y="40" width="160" height="160" fill="#ecf0f1" stroke="#3498db" stroke-width="2"/>
    
    <!-- Circle -->
    <circle cx="120" cy="120" r="80" fill="#f9e79f" stroke="#f39c12" stroke-width="2"/>
    
    <!-- Shaded (corner regions) -->
    <path d="M 40 40 L 40 200 L 200 200 L 200 40 Z M 120 120 m -80 0 a 80 80 0 1 0 160 0 a 80 80 0 1 0 -160 0" fill="#e74c3c" opacity="0.3"/>
    
    <text x="30" y="125" font-family="Arial" font-size="11" fill="#3498db">a = 14 cm</text>
    <text x="120" y="230" text-anchor="middle" font-family="Arial" font-size="11" fill="#2c3e50">Shaded = Square - Circle</text>
  </g>
  
  <!-- Circle with Inscribed Square -->
  <g transform="translate(350, 80)">
    <text x="120" y="-10" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#2c3e50">Circle with Inscribed Square</text>
    
    <!-- Circle -->
    <circle cx="120" cy="120" r="100" fill="#ecf0f1" stroke="#3498db" stroke-width="2"/>
    
    <!-- Square -->
    <rect x="50" y="50" width="140" height="140" fill="#a9dfbf" stroke="#27ae60" stroke-width="2" transform="rotate(45 120 120)"/>
    
    <!-- Diagonal -->
    <line x1="50" y1="50" x2="190" y2="190" stroke="#9b59b6" stroke-width="2" stroke-dasharray="5,5"/>
    
    <text x="120" y="230" text-anchor="middle" font-family="Arial" font-size="11" fill="#2c3e50">Diagonal = 2r</text>
    <text x="200" y="100" font-family="Arial" font-size="11" fill="#9b59b6">d = 2r</text>
  </g>
  
  <!-- Concentric Circles (Ring) -->
  <g transform="translate(620, 80)">
    <text x="100" y="-10" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#2c3e50">Ring (Annulus)</text>
    
    <!-- Outer Circle -->
    <circle cx="100" cy="120" r="90" fill="#ecf0f1" stroke="#3498db" stroke-width="2"/>
    
    <!-- Inner Circle -->
    <circle cx="100" cy="120" r="50" fill="#ffffff" stroke="#e74c3c" stroke-width="2"/>
    
    <!-- Ring shaded -->
    <path d="M 100 30 m -90 0 a 90 90 0 1 0 180 0 a 90 90 0 1 0 -180 0 M 100 70 m -50 0 a 50 50 0 1 0 100 0 a 50 50 0 1 0 -100 0" fill="#f5b041" opacity="0.5"/>
    
    <!-- Center -->
    <circle cx="100" cy="120" r="3" fill="#2c3e50"/>
    <text x="105" y="115" font-family="Arial" font-size="10" fill="#2c3e50">O</text>
    
    <!-- Radii -->
    <line x1="100" y1="120" x2="190" y2="120" stroke="#e74c3c" stroke-width="2"/>
    <line x1="100" y1="120" x2="150" y2="120" stroke="#3498db" stroke-width="2"/>
    
    <text x="130" y="135" font-family="Arial" font-size="10" fill="#e74c3c">R</text>
    <text x="160" y="135" font-family="Arial" font-size="10" fill="#3498db">r</text>
    
    <text x="100" y="230" text-anchor="middle" font-family="Arial" font-size="11" fill="#2c3e50">Area = π(R² - r²)</text>
  </g>
  
  <!-- Semicircle with Triangle -->
  <g transform="translate(80, 340)">
    <text x="120" y="-10" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#2c3e50">Semicircle with Triangle</text>
    
    <!-- Triangle -->
    <polygon points="120,40 40,160 200,160" fill="#d7bde2" stroke="#8e44ad" stroke-width="2"/>
    
    <!-- Semicircle -->
    <path d="M 40 160 A 80 80 0 0 1 200 160" fill="#aed6f1" stroke="#2980b9" stroke-width="2"/>
    
    <!-- Base -->
    <line x1="40" y1="160" x2="200" y2="160" stroke="#2c3e50" stroke-width="2"/>
    
    <text x="120" y="100" text-anchor="middle" font-family="Arial" font-size="11" fill="#8e44ad">Triangle</text>
    <text x="120" y="180" text-anchor="middle" font-family="Arial" font-size="11" fill="#2980b9">Semicircle</text>
    
    <text x="120" y="210" text-anchor="middle" font-family="Arial" font-size="11" fill="#2c3e50">Total = Triangle + Semicircle</text>
  </g>
  
  <!-- Four Semicircles on Square -->
  <g transform="translate(350, 340)">
    <text x="120" y="-10" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#2c3e50">Four Semicircles on Square</text>
    
    <!-- Square -->
    <rect x="40" y="40" width="160" height="160" fill="#ecf0f1" stroke="#3498db" stroke-width="2"/>
    
    <!-- Four Semicircles -->
    <path d="M 40 40 A 40 40 0 0 1 40 200" fill="#f5b041" stroke="#d68910" stroke-width="2"/>
    <path d="M 40 200 A 40 40 0 0 1 200 200" fill="#a9dfbf" stroke="#27ae60" stroke-width="2"/>
    <path d="M 200 200 A 40 40 0 0 1 200 40" fill="#f9e79f" stroke="#f39c12" stroke-width="2"/>
    <path d="M 200 40 A 40 40 0 0 1 40 40" fill="#aed6f1" stroke="#2980b9" stroke-width="2"/>
    
    <text x="120" y="230" text-anchor="middle" font-family="Arial" font-size="11" fill="#2c3e50">4 Semicircles = 2 Full Circles</text>
    <text x="120" y="245" text-anchor="middle" font-family="Arial" font-size="11" fill="#2c3e50">Radius = a/2</text>
  </g>
  
  <!-- Quadrant with Triangle -->
  <g transform="translate(620, 340)">
    <text x="100" y="-10" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#2c3e50">Quadrant</text>
    
    <!-- Quadrant -->
    <path d="M 100 40 L 100 200 A 100 100 0 0 1 200 200 Z" fill="#d5f5e3" stroke="#27ae60" stroke-width="2"/>
    
    <!-- Triangle -->
    <polygon points="100 40 100 200 200 200" fill="none" stroke="#9b59b6" stroke-width="2" stroke-dasharray="5,5"/>
    
    <!-- Center -->
    <circle cx="100" cy="200" r="3" fill="#2c3e50"/>
    <text x="105" y="195" font-family="Arial" font-size="10" fill="#2c3e50">O</text>
    
    <!-- Radii -->
    <text x="85" y="120" font-family="Arial" font-size="11" fill="#27ae60">r</text>
    <text x="150" y="215" font-family="Arial" font-size="11" fill="#27ae60">r</text>
    
    <text x="100" y="230" text-anchor="middle" font-family="Arial" font-size="11" fill="#2c3e50">Area = (1/4)πr²</text>
  </g>
</svg>
