<svg width="600" height="400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="600" height="400" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="300" y="30" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="#2c3e50">Angle of Elevation and Depression</text>
  
  <!-- Angle of Elevation Diagram -->
  <g transform="translate(50, 80)">
    <text x="125" y="-10" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#2c3e50">Angle of Elevation</text>
    
    <!-- Tower -->
    <rect x="110" y="20" width="30" height="180" fill="#3498db" opacity="0.3" stroke="#3498db" stroke-width="2"/>
    
    <!-- Observer -->
    <circle cx="20" cy="200" r="5" fill="#e74c3c"/>
    <text x="10" y="220" font-family="Arial" font-size="12" fill="#2c3e50">Observer</text>
    
    <!-- Line of Sight -->
    <line x1="20" y1="200" x2="125" y2="20" stroke="#e74c3c" stroke-width="2" stroke-dasharray="5,5"/>
    
    <!-- Horizontal Line -->
    <line x1="20" y1="200" x2="140" y2="200" stroke="#2ecc71" stroke-width="2"/>
    
    <!-- Angle Arc -->
    <path d="M 40 200 A 20 20 0 0 0 37 185" fill="none" stroke="#9b59b6" stroke-width="2"/>
    <text x="45" y="190" font-family="Arial" font-size="14" font-weight="bold" fill="#9b59b6">θ</text>
    
    <!-- Labels -->
    <text x="145" y="110" font-family="Arial" font-size="12" fill="#3498db">Height (h)</text>
    <text x="70" y="215" font-family="Arial" font-size="12" fill="#2ecc71">Distance (d)</text>
    <text x="60" y="100" font-family="Arial" font-size="11" fill="#e74c3c">Line of Sight</text>
  </g>
  
  <!-- Angle of Depression Diagram -->
  <g transform="translate(350, 80)">
    <text x="125" y="-10" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#2c3e50">Angle of Depression</text>
    
    <!-- Tower/Cliff -->
    <rect x="10" y="20" width="30" height="180" fill="#3498db" opacity="0.3" stroke="#3498db" stroke-width="2"/>
    
    <!-- Observer on top -->
    <circle cx="25" cy="20" r="5" fill="#e74c3c"/>
    <text x="5" y="15" font-family="Arial" font-size="12" fill="#2c3e50">Observer</text>
    
    <!-- Object on ground -->
    <circle cx="120" cy="200" r="5" fill="#2ecc71"/>
    <text x="110" y="220" font-family="Arial" font-size="12" fill="#2c3e50">Object</text>
    
    <!-- Line of Sight -->
    <line x1="25" y1="20" x2="120" y2="200" stroke="#e74c3c" stroke-width="2" stroke-dasharray="5,5"/>
    
    <!-- Horizontal Line -->
    <line x1="25" y1="20" x2="140" y2="20" stroke="#2ecc71" stroke-width="2"/>
    
    <!-- Angle Arc -->
    <path d="M 45 20 A 20 20 0 0 0 42 35" fill="none" stroke="#9b59b6" stroke-width="2"/>
    <text x="45" y="45" font-family="Arial" font-size="14" font-weight="bold" fill="#9b59b6">θ</text>
    
    <!-- Labels -->
    <text x="45" y="110" font-family="Arial" font-size="12" fill="#3498db">Height (h)</text>
    <text x="60" y="215" font-family="Arial" font-size="12" fill="#2ecc71">Distance (d)</text>
  </g>
  
  <!-- Note -->
  <g transform="translate(150, 350)">
    <rect x="0" y="0" width="300" height="35" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1" rx="5"/>
    <text x="150" y="22" text-anchor="middle" font-family="Arial" font-size="13" fill="#2c3e50">Note: Angle of Elevation = Angle of Depression</text>
  </g>
</svg>
