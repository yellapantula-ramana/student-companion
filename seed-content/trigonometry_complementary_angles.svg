<svg width="500" height="350" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="500" height="350" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="250" y="30" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="#2c3e50">Complementary Angles</text>
  
  <!-- Triangle -->
  <g transform="translate(100, 80)">
    <line x1="0" y1="0" x2="0" y2="180" stroke="#3498db" stroke-width="3"/>
    <line x1="0" y1="180" x2="250" y2="180" stroke="#2ecc71" stroke-width="3"/>
    <line x1="0" y1="0" x2="250" y2="180" stroke="#e74c3c" stroke-width="3"/>
    
    <!-- Right angle -->
    <line x1="0" y1="165" x2="15" y2="165" stroke="#2c3e50" stroke-width="2"/>
    <line x1="15" y1="165" x2="15" y2="180" stroke="#2c3e50" stroke-width="2"/>
    
    <!-- Angle θ -->
    <path d="M 0 165 A 15 15 0 0 0 13 173" fill="none" stroke="#9b59b6" stroke-width="2"/>
    <text x="20" y="175" font-family="Arial" font-size="16" font-weight="bold" fill="#9b59b6">θ</text>
    
    <!-- Angle (90° - θ) -->
    <path d="M 15 15 A 15 15 0 0 1 25 20" fill="none" stroke="#f39c12" stroke-width="2"/>
    <text x="30" y="30" font-family="Arial" font-size="14" font-weight="bold" fill="#f39c12">90°-θ</text>
    
    <!-- Vertices -->
    <text x="-20" y="-10" font-family="Arial" font-size="14" font-weight="bold" fill="#2c3e50">A</text>
    <text x="-20" y="200" font-family="Arial" font-size="14" font-weight="bold" fill="#2c3e50">B</text>
    <text x="260" y="200" font-family="Arial" font-size="14" font-weight="bold" fill="#2c3e50">C</text>
    
    <!-- Angle labels -->
    <text x="125" y="220" text-anchor="middle" font-family="Arial" font-size="14" fill="#2c3e50">∠B = 90°</text>
    <text x="125" y="240" text-anchor="middle" font-family="Arial" font-size="14" fill="#2c3e50">∠A + ∠C = 90°</text>
  </g>
  
  <!-- Formulas -->
  <g transform="translate(380, 100)">
    <rect x="0" y="0" width="110" height="140" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1" rx="5"/>
    <text x="55" y="25" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#2c3e50">Relationships</text>
    <text x="10" y="50" font-family="Arial" font-size="11" fill="#e74c3c">sin(90°-θ)=cosθ</text>
    <text x="10" y="70" font-family="Arial" font-size="11" fill="#e74c3c">cos(90°-θ)=sinθ</text>
    <text x="10" y="90" font-family="Arial" font-size="11" fill="#e74c3c">tan(90°-θ)=cotθ</text>
    <text x="10" y="110" font-family="Arial" font-size="11" fill="#e74c3c">sec(90°-θ)=cosecθ</text>
  </g>
</svg>
