<svg width="850" height="550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="850" height="550" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="425" y="30" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="#2c3e50">Fleming's Left-Hand Rule & Electric Motor</text>
  
  <!-- Fleming's Left Hand Rule -->
  <g transform="translate(50, 80)">
    <text x="120" y="-10" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#2c3e50">Fleming's Left-Hand Rule</text>
    
    <!-- Hand outline -->
    <path d="M 80 120 L 80 60 L 100 60 L 100 100 L 120 100 L 120 80 L 140 80 L 140 120" fill="#f5cba7" stroke="#d68910" stroke-width="2"/>
    
    <!-- Thumb (Force) -->
    <line x1="100" y1="60" x2="100" y2="20" stroke="#e74c3c" stroke-width="6"/>
    <polygon points="100,10 95,25 105,25" fill="#e74c3c"/>
    <text x="110" y="30" font-family="Arial" font-size="11" font-weight="bold" fill="#e74c3c">Thumb = Force (F)</text>
    
    <!-- Forefinger (Field) -->
    <line x1="120" y1="80" x2="170" y2="80" stroke="#3498db" stroke-width="6"/>
    <polygon points="180,80 165,75 165,85" fill="#3498db"/>
    <text x="150" y="70" font-family="Arial" font-size="11" font-weight="bold" fill="#3498db">Forefinger = Field (B)</text>
    
    <!-- Center finger (Current) -->
    <line x1="80" y1="100" x2="40" y2="100" stroke="#27ae60" stroke-width="6"/>
    <polygon points="30,100 45,95 45,105" fill="#27ae60"/>
    <text x="20" y="95" font-family="Arial" font-size="11" font-weight="bold" fill="#27ae60">Center = Current (I)</text>
    
    <text x="120" y="150" text-anchor="middle" font-family="Arial" font-size="10" fill="#2c3e50">All three perpendicular</text>
  </g>
  
  <!-- Simple Electric Motor -->
  <g transform="translate(450, 80)">
    <text x="150" y="-10" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#2c3e50">Simple Electric Motor</text>
    
    <!-- Horseshoe magnet -->
    <path d="M 50 50 L 50 150 C 50 170, 70 170, 70 150 L 70 50" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
    <path d="M 230 50 L 230 150 C 230 170, 210 170, 210 150 L 210 50" fill="#3498db" stroke="#2980b9" stroke-width="2"/>
    
    <text x="60" y="100" font-family="Arial" font-size="14" font-weight="bold" fill="white">N</text>
    <text x="220" y="100" font-family="Arial" font-size="14" font-weight="bold" fill="white">S</text>
    
    <!-- Field lines -->
    <line x1="80" y1="80" x2="200" y2="80" stroke="#f39c12" stroke-width="1" stroke-dasharray="3,3"/>
    <line x1="80" y1="100" x2="200" y2="100" stroke="#f39c12" stroke-width="1" stroke-dasharray="3,3"/>
    <line x1="80" y1="120" x2="200" y2="120" stroke="#f39c12" stroke-width="1" stroke-dasharray="3,3"/>
    
    <!-- Rectangular coil -->
    <rect x="100" y="70" width="80" height="60" fill="none" stroke="#7f8c8d" stroke-width="4"/>
    
    <!-- Axle -->
    <line x1="60" y1="100" x2="100" y2="100" stroke="#95a5a6" stroke-width="4"/>
    <line x1="180" y1="100" x2="240" y2="100" stroke="#95a5a6" stroke-width="4"/>
    
    <!-- Split ring (commutator) -->
    <path d="M 60 95 A 5 5 0 0 1 60 105" fill="none" stroke="#f39c12" stroke-width="3"/>
    <path d="M 235 95 A 5 5 0 0 0 235 105" fill="none" stroke="#f39c12" stroke-width="3"/>
    
    <!-- Brushes -->
    <rect x="50" y="85" width="10" height="30" fill="#34495e"/>
    <rect x="240" y="85" width="10" height="30" fill="#34495e"/>
    
    <!-- Battery -->
    <rect x="100" y="180" width="80" height="30" fill="#2ecc71" stroke="#27ae60" stroke-width="2"/>
    <text x="140" y="200" text-anchor="middle" font-family="Arial" font-size="11" fill="white">Battery</text>
    
    <!-- Connections -->
    <line x1="60" y1="115" x2="60" y2="180" x3="100" y3="180" stroke="#34495e" stroke-width="2"/>
    <line x1="240" y1="115" x2="240" y2="180" x3="180" y3="180" stroke="#34495e" stroke-width="2"/>
    
    <!-- Rotation arrow -->
    <path d="M 140 50 A 20 20 0 0 1 155 65" fill="none" stroke="#e74c3c" stroke-width="2"/>
    <polygon points="158,68 150,62 160,58" fill="#e74c3c"/>
    <text x="140" y="45" text-anchor="middle" font-family="Arial" font-size="10" fill="#e74c3c">Rotation</text>
  </g>
  
  <!-- Working Principle Box -->
  <g transform="translate(50, 320)">
    <rect x="0" y="0" width="380" height="140" fill="#fef9e7" stroke="#f39c12" stroke-width="1" rx="5"/>
    <text x="190" y="25" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#d68910">Working Principle of Motor</text>
    
    <text x="15" y="50" font-family="Arial" font-size="11" fill="#2c3e50">1. Current-carrying coil in magnetic field</text>
    <text x="15" y="70" font-family="Arial" font-size="11" fill="#2c3e50">2. Experiences force (Fleming's Left-Hand Rule)</text>
    <text x="15" y="90" font-family="Arial" font-size="11" fill="#2c3e50">3. Forces on opposite arms create rotation</text>
    <text x="15" y="110" font-family="Arial" font-size="11" fill="#2c3e50">4. Split ring reverses current every half-rotation</text>
    <text x="15" y="130" font-family="Arial" font-size="11" fill="#2c3e50">5. Continuous rotation in one direction</text>
  </g>
  
  <!-- Applications Box -->
  <g transform="translate(450, 320)">
    <rect x="0" y="0" width="380" height="140" fill="#e8f8f5" stroke="#27ae60" stroke-width="1" rx="5"/>
    <text x="190" y="25" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#1e8449">Applications of Electric Motor</text>
    
    <text x="15" y="50" font-family="Arial" font-size="11" fill="#2c3e50">• Electric fans and coolers</text>
    <text x="15" y="70" font-family="Arial" font-size="11" fill="#2c3e50">• Mixers and grinders</text>
    <text x="15" y="90" font-family="Arial" font-size="11" fill="#2c3e50">• Washing machines</text>
    <text x="15" y="110" font-family="Arial" font-size="11" fill="#2c3e50">• Electric vehicles and trains</text>
    <text x="15" y="130" font-family="Arial" font-size="11" fill="#2c3e50">• Computer hard drives and CD players</text>
  </g>
  
  <!-- Force Direction Note -->
  <text x="425" y="490" text-anchor="middle" font-family="Arial" font-size="11" fill="#7f8c8d">Note: Direction of force reverses if current direction OR magnetic field direction is reversed</text>
</svg>
