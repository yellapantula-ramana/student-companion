<svg width="850" height="550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="850" height="550" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="425" y="30" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="#2c3e50">Magnetic Field Lines Around Bar Magnet</text>
  
  <!-- Bar Magnet -->
  <g transform="translate(100, 200)">
    <rect x="0" y="80" width="200" height="80" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
    <rect x="100" y="80" width="100" height="80" fill="#3498db" stroke="#2980b9" stroke-width="2"/>
    
    <text x="50" y="125" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="white">N</text>
    <text x="150" y="125" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="white">S</text>
    
    <text x="50" y="70" text-anchor="middle" font-family="Arial" font-size="12" fill="#2c3e50">North Pole</text>
    <text x="150" y="70" text-anchor="middle" font-family="Arial" font-size="12" fill="#2c3e50">South Pole</text>
  </g>
  
  <!-- Magnetic Field Lines -->
  <g transform="translate(100, 200)">
    <!-- Top field lines -->
    <path d="M 50 80 C 20 40, -20 40, -50 80" fill="none" stroke="#f39c12" stroke-width="2" stroke-dasharray="5,5"/>
    <path d="M 70 80 C 40 20, -40 20, -70 80" fill="none" stroke="#f39c12" stroke-width="2" stroke-dasharray="5,5"/>
    <path d="M 90 80 C 60 0, -60 0, -90 80" fill="none" stroke="#f39c12" stroke-width="2" stroke-dasharray="5,5"/>
    
    <!-- Bottom field lines -->
    <path d="M 50 160 C 20 200, -20 200, -50 160" fill="none" stroke="#f39c12" stroke-width="2" stroke-dasharray="5,5"/>
    <path d="M 70 160 C 40 220, -40 220, -70 160" fill="none" stroke="#f39c12" stroke-width="2" stroke-dasharray="5,5"/>
    <path d="M 90 160 C 60 240, -60 240, -90 160" fill="none" stroke="#f39c12" stroke-width="2" stroke-dasharray="5,5"/>
    
    <!-- Side field lines -->
    <path d="M 200 120 C 240 100, 240 140, 200 120" fill="none" stroke="#f39c12" stroke-width="2" stroke-dasharray="5,5"/>
    <path d="M 210 120 C 260 90, 260 150, 210 120" fill="none" stroke="#f39c12" stroke-width="2" stroke-dasharray="5,5"/>
    
    <!-- Arrows on field lines -->
    <polygon points="20,60 25,70 15,70" fill="#f39c12"/>
    <polygon points="180,180 185,170 175,170" fill="#f39c12"/>
  </g>
  
  <!-- Compass Needles -->
  <g transform="translate(350, 200)">
    <text x="100" y="-20" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#2c3e50">Compass Direction</text>
    
    <!-- Compass 1 -->
    <circle cx="50" cy="50" r="30" fill="#ecf0f1" stroke="#3498db" stroke-width="2"/>
    <line x1="50" y1="30" x2="50" y2="70" stroke="#e74c3c" stroke-width="3"/>
    <polygon points="50,25 55,35 45,35" fill="#e74c3c"/>
    <text x="50" y="25" text-anchor="middle" font-family="Arial" font-size="10" fill="#e74c3c">N</text>
    
    <!-- Compass 2 -->
    <circle cx="150" cy="50" r="30" fill="#ecf0f1" stroke="#3498db" stroke-width="2"/>
    <line x1="150" y1="30" x2="150" y2="70" stroke="#3498db" stroke-width="3"/>
    <polygon points="150,65 155,55 145,55" fill="#3498db"/>
    <text x="150" y="75" text-anchor="middle" font-family="Arial" font-size="10" fill="#3498db">S</text>
    
    <text x="100" y="100" text-anchor="middle" font-family="Arial" font-size="11" fill="#2c3e50">N pole points toward</text>
    <text x="100" y="115" text-anchor="middle" font-family="Arial" font-size="11" fill="#2c3e50">magnetic field direction</text>
  </g>
  
  <!-- Properties Box -->
  <g transform="translate(550, 200)">
    <rect x="0" y="0" width="280" height="140" fill="#fef9e7" stroke="#f39c12" stroke-width="1" rx="5"/>
    <text x="140" y="25" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#d68910">Properties of Field Lines</text>
    
    <text x="15" y="50" font-family="Arial" font-size="11" fill="#2c3e50">1. Emerge from N pole</text>
    <text x="15" y="70" font-family="Arial" font-size="11" fill="#2c3e50">2. Merge at S pole</text>
    <text x="15" y="90" font-family="Arial" font-size="11" fill="#2c3e50">3. Never intersect</text>
    <text x="15" y="110" font-family="Arial" font-size="11" fill="#2c3e50">4. Closer = Stronger field</text>
    <text x="15" y="130" font-family="Arial" font-size="11" fill="#2c3e50">5. Form closed loops</text>
  </g>
  
  <!-- Direction Arrow -->
  <text x="425" y="370" text-anchor="middle" font-family="Arial" font-size="12" fill="#7f8c8d">Direction: N → S (outside magnet), S → N (inside magnet)</text>
</svg>
