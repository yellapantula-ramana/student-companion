<svg width="400" height="300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="300" fill="#f8f9fa"/>
  
  <!-- Title -->
  <text x="200" y="30" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#2c3e50">Right-Angled Triangle</text>
  
  <!-- Triangle -->
  <line x1="100" y1="100" x2="100" y2="250" stroke="#3498db" stroke-width="3"/>
  <line x1="100" y1="250" x2="300" y2="250" stroke="#2ecc71" stroke-width="3"/>
  <line x1="100" y1="100" x2="300" y2="250" stroke="#e74c3c" stroke-width="3"/>
  
  <!-- Right Angle Symbol -->
  <line x1="100" y1="235" x2="115" y2="235" stroke="#2c3e50" stroke-width="2"/>
  <line x1="115" y1="235" x2="115" y2="250" stroke="#2c3e50" stroke-width="2"/>
  
  <!-- Labels -->
  <text x="85" y="180" font-family="Arial" font-size="14" fill="#3498db" font-weight="bold">Perpendicular (P)</text>
  <text x="180" y="270" font-family="Arial" font-size="14" fill="#2ecc71" font-weight="bold">Base (B)</text>
  <text x="220" y="160" font-family="Arial" font-size="14" fill="#e74c3c" font-weight="bold">Hypotenuse (H)</text>
  
  <!-- Angle Arc -->
  <path d="M 130 250 A 30 30 0 0 0 125 238" fill="none" stroke="#9b59b6" stroke-width="2"/>
  <text x="145" y="245" font-family="Arial" font-size="16" font-weight="bold" fill="#9b59b6">θ</text>
  
  <!-- Vertices -->
  <text x="85" y="95" font-family="Arial" font-size="14" font-weight="bold" fill="#2c3e50">A</text>
  <text x="85" y="270" font-family="Arial" font-size="14" font-weight="bold" fill="#2c3e50">B</text>
  <text x="310" y="270" font-family="Arial" font-size="14" font-weight="bold" fill="#2c3e50">C</text>
  
  <!-- Formula Box -->
  <rect x="20" y="285" width="360" height="10" fill="none"/>
</svg>
