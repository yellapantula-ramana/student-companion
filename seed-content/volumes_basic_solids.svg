<svg width="850" height="550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="850" height="550" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="425" y="30" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="#2c3e50">Basic 3D Solids - Formulas</text>
  
  <!-- Cube -->
  <g transform="translate(80, 80)">
    <text x="60" y="-10" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#2c3e50">Cube</text>
    
    <!-- Cube drawing -->
    <path d="M 20 60 L 100 60 L 120 40 L 40 40 Z" fill="#e8f6f3" stroke="#1abc9c" stroke-width="2"/>
    <path d="M 20 60 L 20 140 L 40 120 L 40 40" fill="none" stroke="#1abc9c" stroke-width="2"/>
    <path d="M 100 60 L 100 140 L 120 120 L 120 40" fill="none" stroke="#1abc9c" stroke-width="2"/>
    <path d="M 20 140 L 100 140 L 120 120 L 40 120 Z" fill="#1abc9c" opacity="0.3" stroke="#1abc9c" stroke-width="2"/>
    
    <text x="130" y="100" font-family="Arial" font-size="12" fill="#2c3e50">side = a</text>
    
    <!-- Formulas -->
    <text x="60" y="180" text-anchor="middle" font-family="Arial" font-size="11" fill="#2c3e50">TSA = 6a²</text>
    <text x="60" y="195" text-anchor="middle" font-family="Arial" font-size="11" fill="#2c3e50">V = a³</text>
  </g>
  
  <!-- Cuboid -->
  <g transform="translate(280, 80)">
    <text x="80" y="-10" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#2c3e50">Cuboid</text>
    
    <!-- Cuboid drawing -->
    <path d="M 20 60 L 140 60 L 160 40 L 40 40 Z" fill="#fef9e7" stroke="#f39c12" stroke-width="2"/>
    <path d="M 20 60 L 20 140 L 40 120 L 40 40" fill="none" stroke="#f39c12" stroke-width="2"/>
    <path d="M 140 60 L 140 140 L 160 120 L 160 40" fill="none" stroke="#f39c12" stroke-width="2"/>
    <path d="M 20 140 L 140 140 L 160 120 L 40 120 Z" fill="#f39c12" opacity="0.3" stroke="#f39c12" stroke-width="2"/>
    
    <text x="170" y="70" font-family="Arial" font-size="11" fill="#2c3e50">l</text>
    <text x="10" y="110" font-family="Arial" font-size="11" fill="#2c3e50">h</text>
    <text x="80" y="160" font-family="Arial" font-size="11" fill="#2c3e50">b</text>
    
    <!-- Formulas -->
    <text x="80" y="180" text-anchor="middle" font-family="Arial" font-size="11" fill="#2c3e50">TSA = 2(lb+bh+hl)</text>
    <text x="80" y="195" text-anchor="middle" font-family="Arial" font-size="11" fill="#2c3e50">V = lbh</text>
  </g>
  
  <!-- Cylinder -->
  <g transform="translate(520, 80)">
    <text x="80" y="-10" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#2c3e50">Cylinder</text>
    
    <!-- Cylinder drawing -->
    <ellipse cx="80" cy="60" rx="60" ry="20" fill="#d6eaf8" stroke="#2980b9" stroke-width="2"/>
    <line x1="20" y1="60" x2="20" y2="140" stroke="#2980b9" stroke-width="2"/>
    <line x1="140" y1="60" x2="140" y2="140" stroke="#2980b9" stroke-width="2"/>
    <ellipse cx="80" cy="140" rx="60" ry="20" fill="#2980b9" opacity="0.3" stroke="#2980b9" stroke-width="2"/>
    
    <text x="150" y="100" font-family="Arial" font-size="12" fill="#2c3e50">h</text>
    <text x="80" y="170" font-family="Arial" font-size="12" fill="#2c3e50">r</text>
    
    <!-- Formulas -->
    <text x="80" y="195" text-anchor="middle" font-family="Arial" font-size="11" fill="#2c3e50">CSA = 2πrh</text>
    <text x="80" y="210" text-anchor="middle" font-family="Arial" font-size="11" fill="#2c3e50">V = πr²h</text>
  </g>
  
  <!-- Cone -->
  <g transform="translate(80, 320)">
    <text x="80" y="-10" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#2c3e50">Cone</text>
    
    <!-- Cone drawing -->
    <path d="M 20 140 L 80 40 L 140 140 Z" fill="#fadbd8" stroke="#c0392b" stroke-width="2"/>
    <ellipse cx="80" cy="140" rx="60" ry="15" fill="#c0392b" opacity="0.3" stroke="#c0392b" stroke-width="2"/>
    
    <!-- Height line -->
    <line x1="80" y1="40" x2="80" y2="140" stroke="#2c3e50" stroke-width="1" stroke-dasharray="5,5"/>
    <text x="90" y="90" font-family="Arial" font-size="12" fill="#2c3e50">h</text>
    
    <!-- Slant height -->
    <text x="120" y="100" font-family="Arial" font-size="12" fill="#c0392b">l</text>
    <text x="80" y="165" font-family="Arial" font-size="12" fill="#2c3e50">r</text>
    
    <!-- Formulas -->
    <text x="80" y="195" text-anchor="middle" font-family="Arial" font-size="11" fill="#2c3e50">l = √(r²+h²)</text>
    <text x="80" y="210" text-anchor="middle" font-family="Arial" font-size="11" fill="#2c3e50">V = (1/3)πr²h</text>
  </g>
  
  <!-- Sphere -->
  <g transform="translate(320, 320)">
    <text x="70" y="-10" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#2c3e50">Sphere</text>
    
    <!-- Sphere drawing -->
    <circle cx="70" cy="90" r="60" fill="#e8daef" stroke="#8e44ad" stroke-width="2"/>
    <ellipse cx="70" cy="90" rx="60" ry="20" fill="#8e44ad" opacity="0.2" stroke="#8e44ad" stroke-width="1"/>
    
    <!-- Radius -->
    <line x1="70" y1="90" x2="130" y2="90" stroke="#2c3e50" stroke-width="2"/>
    <text x="95" y="85" font-family="Arial" font-size="12" fill="#2c3e50">r</text>
    
    <!-- Formulas -->
    <text x="70" y="180" text-anchor="middle" font-family="Arial" font-size="11" fill="#2c3e50">SA = 4πr²</text>
    <text x="70" y="195" text-anchor="middle" font-family="Arial" font-size="11" fill="#2c3e50">V = (4/3)πr³</text>
  </g>
  
  <!-- Hemisphere -->
  <g transform="translate(550, 320)">
    <text x="80" y="-10" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#2c3e50">Hemisphere</text>
    
    <!-- Hemisphere drawing -->
    <path d="M 20 140 A 60 60 0 0 1 140 140 Z" fill="#abebc6" stroke="#27ae60" stroke-width="2"/>
    <ellipse cx="80" cy="140" rx="60" ry="15" fill="#27ae60" opacity="0.3" stroke="#27ae60" stroke-width="2"/>
    
    <!-- Radius -->
    <line x1="80" y1="140" x2="140" y2="140" stroke="#2c3e50" stroke-width="2"/>
    <text x="105" y="135" font-family="Arial" font-size="12" fill="#2c3e50">r</text>
    
    <!-- Formulas -->
    <text x="80" y="180" text-anchor="middle" font-family="Arial" font-size="11" fill="#2c3e50">TSA = 3πr²</text>
    <text x="80" y="195" text-anchor="middle" font-family="Arial" font-size="11" fill="#2c3e50">V = (2/3)πr³</text>
  </g>
</svg>
