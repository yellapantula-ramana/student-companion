<svg width="700" height="450" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="700" height="450" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="350" y="30" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="#2c3e50">Applications: Tower and Building Problems</text>
  
  <!-- Scenario 1: Single Tower -->
  <g transform="translate(50, 60)">
    <text x="125" y="-10" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#2c3e50">Single Tower</text>
    
    <!-- Tower -->
    <rect x="110" y="20" width="30" height="150" fill="#3498db" opacity="0.4" stroke="#3498db" stroke-width="2"/>
    <text x="115" y="100" font-family="Arial" font-size="11" fill="#2c3e50">Tower</text>
    
    <!-- Observer -->
    <circle cx="20" cy="170" r="4" fill="#e74c3c"/>
    
    <!-- Line of Sight -->
    <line x1="20" y1="170" x2="125" y2="20" stroke="#e74c3c" stroke-width="2" stroke-dasharray="5,5"/>
    
    <!-- Horizontal -->
    <line x1="20" y1="170" x2="140" y2="170" stroke="#2ecc71" stroke-width="2"/>
    
    <!-- Angle -->
    <path d="M 35 170 A 15 15 0 0 0 33 158" fill="none" stroke="#9b59b6" stroke-width="2"/>
    <text x="38" y="162" font-family="Arial" font-size="12" fill="#9b59b6">θ</text>
    
    <!-- Labels -->
    <text x="145" y="95" font-family="Arial" font-size="11" fill="#3498db">h</text>
    <text x="70" y="185" font-family="Arial" font-size="11" fill="#2ecc71">d</text>
  </g>
  
  <!-- Scenario 2: Two Towers -->
  <g transform="translate(350, 60)">
    <text x="125" y="-10" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#2c3e50">Two Towers</text>
    
    <!-- Tower 1 -->
    <rect x="20" y="40" width="25" height="130" fill="#3498db" opacity="0.4" stroke="#3498db" stroke-width="2"/>
    <text x="22" y="100" font-family="Arial" font-size="10" fill="#2c3e50">Tower 1</text>
    
    <!-- Tower 2 -->
    <rect x="180" y="20" width="25" height="150" fill="#e74c3c" opacity="0.4" stroke="#e74c3c" stroke-width="2"/>
    <text x="182" y="90" font-family="Arial" font-size="10" fill="#2c3e50">Tower 2</text>
    
    <!-- Line connecting tops -->
    <line x1="32" y1="40" x2="192" y2="20" stroke="#9b59b6" stroke-width="2" stroke-dasharray="5,5"/>
    
    <!-- Horizontal -->
    <line x1="32" y1="40" x2="192" y2="40" stroke="#2ecc71" stroke-width="2"/>
    
    <!-- Angle -->
    <path d="M 50 40 A 18 18 0 0 0 48 52" fill="none" stroke="#f39c12" stroke-width="2"/>
    <text x="52" y="55" font-family="Arial" font-size="11" fill="#f39c12">θ</text>
    
    <!-- Labels -->
    <text x="5" y="105" font-family="Arial" font-size="10" fill="#3498db">h₁</text>
    <text x="210" y="95" font-family="Arial" font-size="10" fill="#e74c3c">h₂</text>
    <text x="90" y="185" font-family="Arial" font-size="11" fill="#2ecc71">d</text>
  </g>
  
  <!-- Scenario 3: Tower with Shadow -->
  <g transform="translate(50, 260)">
    <text x="125" y="-10" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#2c3e50">Tower and Shadow</text>
    
    <!-- Tower -->
    <rect x="110" y="30" width="25" height="120" fill="#3498db" opacity="0.4" stroke="#3498db" stroke-width="2"/>
    
    <!-- Sun rays -->
    <line x1="122" y1="30" x2="200" y2="150" stroke="#f39c12" stroke-width="2" stroke-dasharray="5,5"/>
    
    <!-- Shadow -->
    <line x1="135" y1="150" x2="200" y2="150" stroke="#7f8c8d" stroke-width="4"/>
    <text x="155" y="165" font-family="Arial" font-size="11" fill="#7f8c8d">Shadow</text>
    
    <!-- Ground -->
    <line x1="0" y1="150" x2="250" y2="150" stroke="#2ecc71" stroke-width="2"/>
    
    <!-- Sun angle -->
    <path d="M 185 150 A 15 15 0 0 0 175 142" fill="none" stroke="#f39c12" stroke-width="2"/>
    <text x="165" y="135" font-family="Arial" font-size="11" fill="#f39c12">θ (Sun)</text>
    
    <!-- Labels -->
    <text x="140" y="90" font-family="Arial" font-size="11" fill="#3498db">h</text>
  </g>
  
  <!-- Scenario 4: Building and Tower -->
  <g transform="translate(350, 260)">
    <text x="125" y="-10" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#2c3e50">Building and Tower</text>
    
    <!-- Building -->
    <rect x="20" y="60" width="35" height="90" fill="#9b59b6" opacity="0.4" stroke="#9b59b6" stroke-width="2"/>
    <text x="22" y="105" font-family="Arial" font-size="10" fill="#2c3e50">Building</text>
    
    <!-- Tower -->
    <rect x="170" y="20" width="30" height="130" fill="#3498db" opacity="0.4" stroke="#3498db" stroke-width="2"/>
    <text x="172" y="85" font-family="Arial" font-size="10" fill="#2c3e50">Tower</text>
    
    <!-- From building top to tower top -->
    <line x1="37" y1="60" x2="185" y2="20" stroke="#e74c3c" stroke-width="2" stroke-dasharray="5,5"/>
    
    <!-- From building top to tower bottom -->
    <line x1="37" y1="60" x2="185" y2="150" stroke="#2ecc71" stroke-width="2" stroke-dasharray="5,5"/>
    
    <!-- Horizontal from building -->
    <line x1="37" y1="60" x2="185" y2="60" stroke="#95a5a6" stroke-width="2"/>
    
    <!-- Angles -->
    <text x="100" y="50" font-family="Arial" font-size="10" fill="#e74c3c">Elevation α</text>
    <text x="100" y="140" font-family="Arial" font-size="10" fill="#2ecc71">Depression β</text>
    
    <!-- Labels -->
    <text x="5" y="105" font-family="Arial" font-size="10" fill="#9b59b6">h₁</text>
    <text x="205" y="90" font-family="Arial" font-size="10" fill="#3498db">h₂</text>
  </g>
</svg>
