<svg width="750" height="500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="750" height="500" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="375" y="30" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="#2c3e50">Circumscribing Figures</text>
  
  <!-- Triangle with Inscribed Circle -->
  <g transform="translate(50, 60)">
    <text x="150" y="-10" text-anchor="middle" font-family="Arial" font-size="15" font-weight="bold" fill="#2c3e50">Triangle (Inscribed Circle)</text>
    
    <!-- Triangle -->
    <polygon points="150,20 40,180 260,180" fill="#ecf0f1" stroke="#3498db" stroke-width="2"/>
    <text x="150" y="15" font-family="Arial" font-size="12" fill="#3498db">A</text>
    <text x="25" y="195" font-family="Arial" font-size="12" fill="#3498db">B</text>
    <text x="265" y="195" font-family="Arial" font-size="12" fill="#3498db">C</text>
    
    <!-- Inscribed Circle -->
    <circle cx="150" cy="140" r="40" fill="#fff" stroke="#e74c3c" stroke-width="2"/>
    <circle cx="150" cy="140" r="3" fill="#e74c3c"/>
    <text x="155" y="135" font-family="Arial" font-size="11" fill="#e74c3c">O</text>
    
    <!-- Points of Contact -->
    <circle cx="150" cy="180" r="3" fill="#2ecc71"/>
    <circle cx="100" cy="100" r="3" fill="#2ecc71"/>
    <circle cx="200" cy="100" r="3" fill="#2ecc71"/>
    <text x="155" y="195" font-family="Arial" font-size="10" fill="#2ecc71">D</text>
    <text x="85" y="95" font-family="Arial" font-size="10" fill="#2ecc71">E</text>
    <text x="205" y="95" font-family="Arial" font-size="10" fill="#2ecc71">F</text>
    
    <!-- Tangent marks -->
    <text x="60" y="150" font-family="Arial" font-size="10" fill="#9b59b6">AE=AF</text>
    <text x="180" y="150" font-family="Arial" font-size="10" fill="#9b59b6">BD=BF</text>
  </g>
  
  <!-- Quadrilateral with Inscribed Circle -->
  <g transform="translate(400, 60)">
    <text x="150" y="-10" text-anchor="middle" font-family="Arial" font-size="15" font-weight="bold" fill="#2c3e50">Quadrilateral (Inscribed Circle)</text>
    
    <!-- Quadrilateral -->
    <polygon points="150,30 250,100 220,200 80,180" fill="#ecf0f1" stroke="#3498db" stroke-width="2"/>
    <text x="150" y="25" font-family="Arial" font-size="12" fill="#3498db">A</text>
    <text x="260" y="100" font-family="Arial" font-size="12" fill="#3498db">B</text>
    <text x="230" y="215" font-family="Arial" font-size="12" fill="#3498db">C</text>
    <text x="65" y="195" font-family="Arial" font-size="12" fill="#3498db">D</text>
    
    <!-- Inscribed Circle -->
    <circle cx="165" cy="125" r="50" fill="#fff" stroke="#e74c3c" stroke-width="2"/>
    <circle cx="165" cy="125" r="3" fill="#e74c3c"/>
    <text x="170" y="120" font-family="Arial" font-size="11" fill="#e74c3c">O</text>
    
    <!-- Points of Contact -->
    <circle cx="140" cy="70" r="3" fill="#2ecc71"/>
    <circle cx="210" cy="110" r="3" fill="#2ecc71"/>
    <circle cx="180" cy="175" r="3" fill="#2ecc71"/>
    <circle cx="110" cy="140" r="3" fill="#2ecc71"/>
    <text x="135" y="65" font-family="Arial" font-size="9" fill="#2ecc71">P</text>
    <text x="215" y="105" font-family="Arial" font-size="9" fill="#2ecc71">Q</text>
    <text x="185" y="190" font-family="Arial" font-size="9" fill="#2ecc71">R</text>
    <text x="95" y="155" font-family="Arial" font-size="9" fill="#2ecc71">S</text>
  </g>
  
  <!-- Property Box -->
  <g transform="translate(50, 320)">
    <rect x="0" y="0" width="320" height="160" fill="#e8f6f3" stroke="#1abc9c" stroke-width="1" rx="5"/>
    <text x="160" y="25" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#16a085">Triangle Properties</text>
    
    <text x="15" y="50" font-family="Arial" font-size="12" fill="#2c3e50">• AD = AF (tangents from A)</text>
    <text x="15" y="75" font-family="Arial" font-size="12" fill="#2c3e50">• BD = BE (tangents from B)</text>
    <text x="15" y="100" font-family="Arial" font-size="12" fill="#2c3e50">• CE = CF (tangents from C)</text>
    <text x="15" y="125" font-family="Arial" font-size="12" fill="#2c3e50">• AD + BE + CF = s (semi-perimeter)</text>
    <text x="15" y="150" font-family="Arial" font-size="12" fill="#16a085" font-weight="bold">For right triangle: r = (a+b-c)/2</text>
  </g>
  
  <!-- Quadrilateral Property Box -->
  <g transform="translate(420, 320)">
    <rect x="0" y="0" width="310" height="160" fill="#fef9e7" stroke="#f39c12" stroke-width="1" rx="5"/>
    <text x="155" y="25" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#d68910">Quadrilateral Properties</text>
    
    <text x="15" y="50" font-family="Arial" font-size="12" fill="#2c3e50">• AP = AS (tangents from A)</text>
    <text x="15" y="75" font-family="Arial" font-size="12" fill="#2c3e50">• BP = BQ (tangents from B)</text>
    <text x="15" y="100" font-family="Arial" font-size="12" fill="#2c3e50">• CQ = CR (tangents from C)</text>
    <text x="15" y="125" font-family="Arial" font-size="12" fill="#2c3e50">• DR = DS (tangents from D)</text>
    <text x="15" y="150" font-family="Arial" font-size="12" fill="#d68910" font-weight="bold">AB + CD = AD + BC</text>
  </g>
</svg>
