<svg width="850" height="550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="850" height="550" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="425" y="30" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="#2c3e50">Magnetic Field Around Current-Carrying Conductor</text>
  
  <!-- Straight Conductor -->
  <g transform="translate(100, 80)">
    <text x="100" y="-10" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#2c3e50">Straight Conductor</text>
    
    <!-- Wire -->
    <line x1="100" y1="20" x2="100" y2="180" stroke="#7f8c8d" stroke-width="8"/>
    
    <!-- Current direction -->
    <polygon points="100,30 105,45 95,45" fill="#e74c3c"/>
    <text x="115" y="50" font-family="Arial" font-size="11" fill="#e74c3c">Current (I)</text>
    
    <!-- Concentric circles (magnetic field) -->
    <circle cx="100" cy="100" r="30" fill="none" stroke="#3498db" stroke-width="2" stroke-dasharray="5,5"/>
    <circle cx="100" cy="100" r="50" fill="none" stroke="#3498db" stroke-width="2" stroke-dasharray="5,5"/>
    <circle cx="100" cy="100" r="70" fill="none" stroke="#3498db" stroke-width="2" stroke-dasharray="5,5"/>
    
    <!-- Direction arrows on circles -->
    <polygon points="130,100 125,95 125,105" fill="#3498db"/>
    <polygon points="70,100 75,105 75,95" fill="#3498db"/>
    
    <text x="100" y="200" text-anchor="middle" font-family="Arial" font-size="11" fill="#2c3e50">Concentric circles</text>
  </g>
  
  <!-- Right-Hand Thumb Rule -->
  <g transform="translate(350, 80)">
    <text x="100" y="-10" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#2c3e50">Right-Hand Thumb Rule</text>
    
    <!-- Hand outline (simplified) -->
    <ellipse cx="100" cy="100" rx="40" ry="50" fill="#f5cba7" stroke="#d68910" stroke-width="2"/>
    
    <!-- Thumb -->
    <rect x="85" y="30" width="30" height="60" fill="#f5cba7" stroke="#d68910" stroke-width="2" rx="5"/>
    <polygon points="100,20 90,35 110,35" fill="#e74c3c"/>
    <text x="100" y="15" text-anchor="middle" font-family="Arial" font-size="10" fill="#e74c3c">I</text>
    
    <!-- Curled fingers -->
    <path d="M 60 100 C 40 90, 40 110, 60 100" fill="none" stroke="#3498db" stroke-width="3"/>
    <path d="M 140 100 C 160 90, 160 110, 140 100" fill="none" stroke="#3498db" stroke-width="3"/>
    
    <text x="100" y="170" text-anchor="middle" font-family="Arial" font-size="10" fill="#2c3e50">Thumb = Current</text>
    <text x="100" y="185" text-anchor="middle" font-family="Arial" font-size="10" fill="#2c3e50">Fingers = Field direction</text>
  </g>
  
  <!-- Circular Loop -->
  <g transform="translate(600, 80)">
    <text x="100" y="-10" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#2c3e50">Circular Loop</text>
    
    <!-- Loop -->
    <circle cx="100" cy="100" r="60" fill="none" stroke="#7f8c8d" stroke-width="6"/>
    
    <!-- Current direction -->
    <polygon points="100,35 95,45 105,45" fill="#e74c3c"/>
    <polygon points="100,165 105,155 95,155" fill="#e74c3c"/>
    
    <!-- Field lines at center -->
    <line x1="100" y1="60" x2="100" y2="140" stroke="#3498db" stroke-width="3" stroke-dasharray="5,5"/>
    <polygon points="100,70 95,80 105,80" fill="#3498db"/>
    
    <text x="100" y="180" text-anchor="middle" font-family="Arial" font-size="11" fill="#2c3e50">Field at center: Straight</text>
  </g>
  
  <!-- Solenoid -->
  <g transform="translate(100, 320)">
    <text x="150" y="-10" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#2c3e50">Solenoid (Coil)</text>
    
    <!-- Coil representation -->
    <ellipse cx="50" cy="50" rx="30" ry="40" fill="none" stroke="#7f8c8d" stroke-width="3"/>
    <ellipse cx="100" cy="50" rx="30" ry="40" fill="none" stroke="#7f8c8d" stroke-width="3"/>
    <ellipse cx="150" cy="50" rx="30" ry="40" fill="none" stroke="#7f8c8d" stroke-width="3"/>
    <ellipse cx="200" cy="50" rx="30" ry="40" fill="none" stroke="#7f8c8d" stroke-width="3"/>
    <ellipse cx="250" cy="50" rx="30" ry="40" fill="none" stroke="#7f8c8d" stroke-width="3"/>
    
    <!-- Connections -->
    <line x1="20" y1="50" x2="50" y2="50" stroke="#7f8c8d" stroke-width="3"/>
    <line x1="280" y1="50" x2="300" y2="50" stroke="#7f8c8d" stroke-width="3"/>
    
    <!-- Field lines inside -->
    <line x1="50" y1="30" x2="250" y2="30" stroke="#3498db" stroke-width="2" stroke-dasharray="5,5"/>
    <line x1="50" y1="50" x2="250" y2="50" stroke="#3498db" stroke-width="2" stroke-dasharray="5,5"/>
    <line x1="50" y1="70" x2="250" y2="70" stroke="#3498db" stroke-width="2" stroke-dasharray="5,5"/>
    
    <!-- Poles -->
    <text x="20" y="45" font-family="Arial" font-size="14" font-weight="bold" fill="#e74c3c">S</text>
    <text x="280" y="45" font-family="Arial" font-size="14" font-weight="bold" fill="#3498db">N</text>
    
    <text x="150" y="110" text-anchor="middle" font-family="Arial" font-size="11" fill="#2c3e50">Uniform field inside</text>
  </g>
  
  <!-- Factors Box -->
  <g transform="translate(450, 320)">
    <rect x="0" y="0" width="380" height="120" fill="#e8f6f3" stroke="#1abc9c" stroke-width="1" rx="5"/>
    <text x="190" y="25" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#16a085">Factors Affecting Magnetic Field</text>
    
    <text x="15" y="50" font-family="Arial" font-size="12" fill="#2c3e50">1. Current (I): B ∝ I (more current = stronger field)</text>
    <text x="15" y="75" font-family="Arial" font-size="12" fill="#2c3e50">2. Distance (r): B ∝ 1/r (closer = stronger field)</text>
    <text x="15" y="100" font-family="Arial" font-size="12" fill="#2c3e50">3. Number of turns (n): B ∝ n (more turns = stronger)</text>
    <text x="15" y="125" font-family="Arial" font-size="12" fill="#2c3e50">4. Core material: Soft iron increases field strength</text>
  </g>
</svg>
