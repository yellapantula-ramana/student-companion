<svg width="700" height="350" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="700" height="350" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="350" y="30" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="#2c3e50">Standard Angles - Special Triangles</text>
  
  <!-- 30°-60°-90° Triangle -->
  <g transform="translate(50, 70)">
    <text x="125" y="-10" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#2c3e50">30°-60°-90° Triangle</text>
    <line x1="0" y1="0" x2="0" y2="150" stroke="#3498db" stroke-width="2"/>
    <line x1="0" y1="150" x2="250" y2="150" stroke="#2ecc71" stroke-width="2"/>
    <line x1="0" y1="0" x2="250" y2="150" stroke="#e74c3c" stroke-width="2"/>
    
    <!-- Right angle -->
    <line x1="0" y1="135" x2="15" y2="135" stroke="#2c3e50" stroke-width="2"/>
    <line x1="15" y1="135" x2="15" y2="150" stroke="#2c3e50" stroke-width="2"/>
    
    <!-- Angles -->
    <path d="M 0 135 A 15 15 0 0 0 13 143" fill="none" stroke="#9b59b6" stroke-width="2"/>
    <text x="20" y="145" font-family="Arial" font-size="14" font-weight="bold" fill="#9b59b6">30°</text>
    
    <path d="M 15 15 A 15 15 0 0 1 13 25" fill="none" stroke="#f39c12" stroke-width="2"/>
    <text x="20" y="25" font-family="Arial" font-size="14" font-weight="bold" fill="#f39c12">60°</text>
    
    <!-- Side labels -->
    <text x="-40" y="80" font-family="Arial" font-size="14" fill="#3498db">1</text>
    <text x="125" y="170" text-anchor="middle" font-family="Arial" font-size="14" fill="#2ecc71">√3</text>
    <text x="140" y="70" font-family="Arial" font-size="14" fill="#e74c3c">2</text>
  </g>
  
  <!-- 45°-45°-90° Triangle -->
  <g transform="translate(400, 70)">
    <text x="125" y="-10" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#2c3e50">45°-45°-90° Triangle</text>
    <line x1="0" y1="0" x2="0" y2="150" stroke="#3498db" stroke-width="2"/>
    <line x1="0" y1="150" x2="150" y2="150" stroke="#2ecc71" stroke-width="2"/>
    <line x1="0" y1="0" x2="150" y2="150" stroke="#e74c3c" stroke-width="2"/>
    
    <!-- Right angle -->
    <line x1="0" y1="135" x2="15" y2="135" stroke="#2c3e50" stroke-width="2"/>
    <line x1="15" y1="135" x2="15" y2="150" stroke="#2c3e50" stroke-width="2"/>
    
    <!-- Angles -->
    <path d="M 0 135 A 15 15 0 0 0 13 143" fill="none" stroke="#9b59b6" stroke-width="2"/>
    <text x="20" y="145" font-family="Arial" font-size="14" font-weight="bold" fill="#9b59b6">45°</text>
    
    <path d="M 15 15 A 15 15 0 0 1 13 25" fill="none" stroke="#9b59b6" stroke-width="2"/>
    <text x="20" y="25" font-family="Arial" font-size="14" font-weight="bold" fill="#9b59b6">45°</text>
    
    <!-- Side labels -->
    <text x="-40" y="80" font-family="Arial" font-size="14" fill="#3498db">1</text>
    <text x="75" y="170" text-anchor="middle" font-family="Arial" font-size="14" fill="#2ecc71">1</text>
    <text x="90" y="70" font-family="Arial" font-size="14" fill="#e74c3c">√2</text>
  </g>
  
  <!-- Values Table -->
  <g transform="translate(100, 280)">
    <rect x="0" y="0" width="500" height="60" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1" rx="5"/>
    <text x="250" y="20" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#2c3e50">Key Values to Remember</text>
    <text x="80" y="45" font-family="Arial" font-size="12" fill="#2c3e50">sin 30° = 1/2</text>
    <text x="200" y="45" font-family="Arial" font-size="12" fill="#2c3e50">sin 45° = 1/√2</text>
    <text x="320" y="45" font-family="Arial" font-size="12" fill="#2c3e50">sin 60° = √3/2</text>
    <text x="420" y="45" font-family="Arial" font-size="12" fill="#2c3e50">tan 45° = 1</text>
  </g>
</svg>
