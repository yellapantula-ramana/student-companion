<svg width="800" height="500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="500" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="#2c3e50">Sector and Segment of Circle</text>
  
  <!-- Sector Diagram -->
  <g transform="translate(100, 100)">
    <text x="120" y="-10" text-anchor="middle" font-family="Arial" font-size="15" font-weight="bold" fill="#2c3e50">Sector</text>
    
    <!-- Circle -->
    <circle cx="120" cy="120" r="100" fill="#ecf0f1" stroke="#3498db" stroke-width="2"/>
    
    <!-- Center -->
    <circle cx="120" cy="120" r="4" fill="#e74c3c"/>
    <text x="125" y="115" font-family="Arial" font-size="12" font-weight="bold" fill="#e74c3c">O</text>
    
    <!-- Sector (60 degrees) -->
    <path d="M 120 120 L 220 120 A 100 100 0 0 1 170 206.6 Z" fill="#f9e79f" stroke="#f39c12" stroke-width="2"/>
    
    <!-- Radii -->
    <line x1="120" y1="120" x2="220" y2="120" stroke="#e74c3c" stroke-width="2"/>
    <line x1="120" y1="120" x2="170" y2="206.6" stroke="#e74c3c" stroke-width="2"/>
    
    <!-- Arc -->
    <path d="M 220 120 A 100 100 0 0 1 170 206.6" fill="none" stroke="#2ecc71" stroke-width="3"/>
    
    <!-- Angle arc -->
    <path d="M 140 120 A 20 20 0 0 1 137 135" fill="none" stroke="#9b59b6" stroke-width="2"/>
    <text x="145" y="135" font-family="Arial" font-size="12" fill="#9b59b6">θ</text>
    
    <!-- Labels -->
    <text x="225" y="115" font-family="Arial" font-size="11" fill="#e74c3c">A</text>
    <text x="175" y="220" font-family="Arial" font-size="11" fill="#e74c3c">B</text>
    <text x="195" y="180" font-family="Arial" font-size="11" fill="#2ecc71">Arc</text>
    <text x="80" y="150" font-family="Arial" font-size="11" fill="#3498db">r</text>
    
    <text x="120" y="250" text-anchor="middle" font-family="Arial" font-size="12" fill="#2c3e50">Shaded = Sector OAB</text>
  </g>
  
  <!-- Segment Diagram -->
  <g transform="translate(450, 100)">
    <text x="120" y="-10" text-anchor="middle" font-family="Arial" font-size="15" font-weight="bold" fill="#2c3e50">Segment</text>
    
    <!-- Circle -->
    <circle cx="120" cy="120" r="100" fill="#ecf0f1" stroke="#3498db" stroke-width="2"/>
    
    <!-- Center -->
    <circle cx="120" cy="120" r="4" fill="#e74c3c"/>
    <text x="125" y="115" font-family="Arial" font-size="12" font-weight="bold" fill="#e74c3c">O</text>
    
    <!-- Segment (shaded) -->
    <path d="M 50 80 L 190 80 A 100 100 0 0 1 120 220 Z" fill="#a9dfbf" stroke="#27ae60" stroke-width="2"/>
    
    <!-- Chord -->
    <line x1="50" y1="80" x2="190" y2="80" stroke="#9b59b6" stroke-width="3"/>
    
    <!-- Radii -->
    <line x1="120" y1="120" x2="50" y2="80" stroke="#e74c3c" stroke-width="2" stroke-dasharray="5,5"/>
    <line x1="120" y1="120" x2="190" y2="80" stroke="#e74c3c" stroke-width="2" stroke-dasharray="5,5"/>
    
    <!-- Labels -->
    <text x="40" y="75" font-family="Arial" font-size="11" fill="#9b59b6">A</text>
    <text x="195" y="75" font-family="Arial" font-size="11" fill="#9b59b6">B</text>
    <text x="120" y="160" text-anchor="middle" font-family="Arial" font-size="11" fill="#27ae60">Segment</text>
    <text x="100" y="100" font-family="Arial" font-size="11" fill="#e74c3c">Chord AB</text>
    
    <text x="120" y="250" text-anchor="middle" font-family="Arial" font-size="12" fill="#2c3e50">Shaded = Segment</text>
  </g>
  
  <!-- Formulas Box -->
  <g transform="translate(100, 380)">
    <rect x="0" y="0" width="280" height="100" fill="#fef9e7" stroke="#f39c12" stroke-width="1" rx="5"/>
    <text x="140" y="25" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#d68910">Sector Formulas</text>
    
    <text x="15" y="50" font-family="Arial" font-size="12" fill="#2c3e50">Area = (θ/360°) × πr²</text>
    <text x="15" y="70" font-family="Arial" font-size="12" fill="#2c3e50">Arc Length = (θ/360°) × 2πr</text>
    <text x="15" y="90" font-family="Arial" font-size="12" fill="#2c3e50">Perimeter = 2r + Arc Length</text>
  </g>
  
  <!-- Segment Formula Box -->
  <g transform="translate(420, 380)">
    <rect x="0" y="0" width="280" height="100" fill="#e8f6f3" stroke="#1abc9c" stroke-width="1" rx="5"/>
    <text x="140" y="25" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#16a085">Segment Formula</text>
    
    <text x="15" y="50" font-family="Arial" font-size="12" fill="#2c3e50">Area of Segment =</text>
    <text x="30" y="70" font-family="Arial" font-size="12" fill="#16a085" font-weight="bold">Area of Sector - Area of Triangle</text>
    <text x="15" y="90" font-family="Arial" font-size="11" fill="#2c3e50">For 90°: Segment = (πr²/4) - (r²/2)</text>
  </g>
</svg>
