<svg width="800" height="500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="500" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="#2c3e50">Division of Line Segment</text>
  
  <!-- Diagram 1: Line Segment AB -->
  <g transform="translate(50, 80)">
    <text x="150" y="-10" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#2c3e50">Step 1: Draw AB</text>
    
    <line x1="20" y1="50" x2="280" y2="50" stroke="#3498db" stroke-width="3"/>
    <circle cx="20" cy="50" r="4" fill="#e74c3c"/>
    <circle cx="280" cy="50" r="4" fill="#e74c3c"/>
    <text x="15" y="45" font-family="Arial" font-size="13" font-weight="bold" fill="#e74c3c">A</text>
    <text x="285" y="45" font-family="Arial" font-size="13" font-weight="bold" fill="#e74c3c">B</text>
    <text x="140" y="70" text-anchor="middle" font-family="Arial" font-size="12" fill="#2c3e50">Length = 8 cm</text>
  </g>
  
  <!-- Diagram 2: Ray AX with points -->
  <g transform="translate(400, 80)">
    <text x="150" y="-10" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#2c3e50">Step 2-3: Mark Points</text>
    
    <line x1="20" y1="50" x2="280" y2="50" stroke="#3498db" stroke-width="2"/>
    <line x1="20" y1="50" x2="80" y2="10" stroke="#2ecc71" stroke-width="2"/>
    
    <circle cx="35" cy="40" r="3" fill="#e74c3c"/>
    <circle cx="50" cy="30" r="3" fill="#e74c3c"/>
    <circle cx="65" cy="20" r="3" fill="#e74c3c"/>
    <circle cx="80" cy="10" r="3" fill="#e74c3c"/>
    <circle cx="95" cy="0" r="3" fill="#e74c3c"/>
    
    <text x="30" y="55" font-family="Arial" font-size="10" fill="#2c3e50">A₁</text>
    <text x="45" y="45" font-family="Arial" font-size="10" fill="#2c3e50">A₂</text>
    <text x="60" y="35" font-family="Arial" font-size="10" fill="#2c3e50">A₃</text>
    <text x="75" y="25" font-family="Arial" font-size="10" fill="#2c3e50">A₄</text>
    <text x="90" y="15" font-family="Arial" font-size="10" fill="#2c3e50">A₅</text>
    
    <text x="15" y="45" font-family="Arial" font-size="12" fill="#3498db" font-weight="bold">A</text>
    <text x="285" y="55" font-family="Arial" font-size="12" fill="#3498db" font-weight="bold">B</text>
    <text x="100" y="15" font-family="Arial" font-size="12" fill="#2ecc71" font-weight="bold">X</text>
  </g>
  
  <!-- Diagram 3: Complete Construction -->
  <g transform="translate(100, 250)">
    <text x="200" y="-10" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#2c3e50">Step 4-5: Complete Division</text>
    
    <!-- Main line -->
    <line x1="20" y1="100" x2="380" y2="100" stroke="#3498db" stroke-width="2"/>
    
    <!-- Ray -->
    <line x1="20" y1="100" x2="80" y2="50" stroke="#2ecc71" stroke-width="2"/>
    
    <!-- Points on ray -->
    <circle cx="32" cy="90" r="2" fill="#e74c3c"/>
    <circle cx="44" cy="80" r="2" fill="#e74c3c"/>
    <circle cx="56" cy="70" r="2" fill="#e74c3c"/>
    <circle cx="68" cy="60" r="2" fill="#e74c3c"/>
    <circle cx="80" cy="50" r="2" fill="#e74c3c"/>
    
    <!-- Line A5 to B -->
    <line x1="80" y1="50" x2="380" y2="100" stroke="#9b59b6" stroke-width="2"/>
    
    <!-- Parallel through A3 -->
    <line x1="56" y1="70" x2="236" y2="100" stroke="#f39c12" stroke-width="3"/>
    
    <!-- Point P -->
    <circle cx="236" cy="100" r="4" fill="#e74c3c"/>
    <text x="236" y="120" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#e74c3c">P</text>
    
    <!-- Labels -->
    <text x="15" y="115" font-family="Arial" font-size="12" fill="#3498db" font-weight="bold">A</text>
    <text x="385" y="115" font-family="Arial" font-size="12" fill="#3498db" font-weight="bold">B</text>
    <text x="75" y="45" font-family="Arial" font-size="11" fill="#2ecc71">A₅</text>
    <text x="50" y="65" font-family="Arial" font-size="11" fill="#2ecc71">A₃</text>
    
    <!-- Ratio indication -->
    <text x="130" y="130" text-anchor="middle" font-family="Arial" font-size="12" fill="#2c3e50">AP:PB = 3:2</text>
  </g>
  
  <!-- Formula Box -->
  <g transform="translate(550, 250)">
    <rect x="0" y="0" width="230" height="120" fill="#e8f6f3" stroke="#1abc9c" stroke-width="1" rx="5"/>
    <text x="115" y="25" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#16a085">Key Points</text>
    
    <text x="10" y="50" font-family="Arial" font-size="11" fill="#2c3e50">• Total points = m + n</text>
    <text x="10" y="70" font-family="Arial" font-size="11" fill="#2c3e50">• For 3:2, mark 5 points</text>
    <text x="10" y="90" font-family="Arial" font-size="11" fill="#2c3e50">• Join A₅ to B</text>
    <text x="10" y="110" font-family="Arial" font-size="11" fill="#2c3e50">• Draw parallel through A₃</text>
  </g>
  
  <!-- Justification -->
  <g transform="translate(550, 390)">
    <rect x="0" y="0" width="230" height="90" fill="#fef9e7" stroke="#f39c12" stroke-width="1" rx="5"/>
    <text x="115" y="20" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#d68910">Justification</text>
    <text x="10" y="45" font-family="Arial" font-size="11" fill="#2c3e50">By Basic Proportionality</text>
    <text x="10" y="65" font-family="Arial" font-size="11" fill="#2c3e50">Theorem:</text>
    <text x="50" y="85" font-family="Arial" font-size="12" fill="#d68910" font-weight="bold">AP/PB = AA₃/A₃A₅ = 3/2</text>
  </g>
</svg>
