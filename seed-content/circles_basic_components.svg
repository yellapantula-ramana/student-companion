<svg width="700" height="450" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="700" height="450" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="350" y="30" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="#2c3e50">Circle - Basic Components</text>
  
  <!-- Main Circle Diagram -->
  <g transform="translate(200, 150)">
    <!-- Circle -->
    <circle cx="150" cy="150" r="120" fill="#ecf0f1" stroke="#3498db" stroke-width="3"/>
    
    <!-- Center -->
    <circle cx="150" cy="150" r="5" fill="#e74c3c"/>
    <text x="160" y="145" font-family="Arial" font-size="14" font-weight="bold" fill="#e74c3c">O</text>
    <text x="135" y="170" font-family="Arial" font-size="12" fill="#2c3e50">(Center)</text>
    
    <!-- Radius -->
    <line x1="150" y1="150" x2="270" y2="150" stroke="#2ecc71" stroke-width="3"/>
    <text x="195" y="140" font-family="Arial" font-size="13" font-weight="bold" fill="#2ecc71">Radius (r)</text>
    
    <!-- Diameter -->
    <line x1="30" y1="150" x2="270" y2="150" stroke="#9b59b6" stroke-width="2" stroke-dasharray="5,5"/>
    <text x="135" y="185" font-family="Arial" font-size="13" font-weight="bold" fill="#9b59b6">Diameter (d)</text>
    
    <!-- Chord -->
    <line x1="80" y1="80" x2="220" y2="80" stroke="#f39c12" stroke-width="3"/>
    <text x="135" y="70" font-family="Arial" font-size="13" font-weight="bold" fill="#f39c12">Chord</text>
    
    <!-- Point on circle -->
    <circle cx="270" cy="150" r="4" fill="#3498db"/>
    <text x="275" y="155" font-family="Arial" font-size="12" fill="#3498db">A</text>
    
    <circle cx="80" cy="80" r="4" fill="#f39c12"/>
    <circle cx="220" cy="80" r="4" fill="#f39c12"/>
  </g>
  
  <!-- Labels Box -->
  <g transform="translate(480, 100)">
    <rect x="0" y="0" width="200" height="200" fill="#f8f9fa" stroke="#bdc3c7" stroke-width="1" rx="5"/>
    <text x="100" y="25" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#2c3e50">Key Terms</text>
    
    <text x="10" y="55" font-family="Arial" font-size="12" fill="#2c3e50">• Center: Fixed point O</text>
    <text x="10" y="80" font-family="Arial" font-size="12" fill="#2c3e50">• Radius: Distance from O</text>
    <text x="10" y="105" font-family="Arial" font-size="12" fill="#2c3e50">• Diameter: d = 2r</text>
    <text x="10" y="130" font-family="Arial" font-size="12" fill="#2c3e50">• Chord: Line joining 2 points</text>
    <text x="10" y="155" font-family="Arial" font-size="12" fill="#2c3e50">• All radii are equal</text>
    <text x="10" y="180" font-family="Arial" font-size="12" fill="#2c3e50">• Diameter is longest chord</text>
  </g>
  
  <!-- Formulas -->
  <g transform="translate(50, 380)">
    <rect x="0" y="0" width="300" height="60" fill="#e8f6f3" stroke="#1abc9c" stroke-width="1" rx="5"/>
    <text x="150" y="20" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="#16a085">Important Formulas</text>
    <text x="20" y="40" font-family="Arial" font-size="12" fill="#2c3e50">Diameter: d = 2r</text>
    <text x="20" y="55" font-family="Arial" font-size="12" fill="#2c3e50">Circumference: C = 2πr</text>
  </g>
</svg>
